<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./css/global-styles.css"/>

    <style>
        /* Estilos para el logo de la UCU */
      .logo {
        display: block;
        margin: auto; /* Centra la imagen */
        height: 40px;
        width: auto;
      }
    
        /* Estilos para el título "Gestion de proveedores" */
      .card-title {
        text-align: center;
        font-size: 24px;
        font-weight: 600;
        margin: 5px;

      }
         /* Estilos para el subtítulo "Iniciar Sesión" */
      .card-subtitle {
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 20px; 
      }
      /* Estilos para CENTRAR el contenedor de inicio de sesión */
      .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
      }

      /* Estilos para la tarjeta de inicio de sesión */
      .login-card {
        background-color: #ffffff;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        width: 100%;
        max-width: 400px; /* Para que no se estire infinito en monitores grandes */
        border-radius: 5px;
      }

      /* Estilos para separar los inputs del formuario en lineas distintas */
      .form-group {
        display: flex;
        flex-direction: column; /* Label arriba, Input abajo */
        margin-bottom: 20px; 
      }
      /* Estilos para separar un poco los inputs de los labels */
      .form-group label {
        margin-bottom: 10px;
      }
      /* Estilos de los campos de texto e input */
      .form-input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      /* Estilos del botón "ingresar" */
      .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      /* Cambio de color al pasar el mouse por el botón de "Ingresar" */
      .btn-submit:hover {
        background-color: #0056b3; 
      }
      /* Estilos para el Footer */
      .footer-container {
        background-color: #1E3264; 
        padding: 20px 0; 
        width: 100%;
      }
      /* Estilos para el logo del Footer */
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1); /* Invierte los colores de la imagen del logo de la UCU */
      }
    </style>
  </head>

  <body>
    <main class="login-container">
      <section class="login-card">
        <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo"/>
        <h3 class="card-title">Gestion de Proveedores</h3>
        <h4 class ="card-subtitle">Iniciar Sesión</h4>
        <form action="landing.html" class="login-form">
          <div class="form-group">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="Ej: mika.schaffell"/>
          </div>

          <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Contraseña"/>
          </div>

          <input type="submit" value="Ingresar" class="btn-submit" />
        </form>

      </section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>
  </body>
</html>
