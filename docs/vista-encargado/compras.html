<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Compras - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css" />
    <style>
      /* Estilos para el logo del header */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      /* Estilos del Header */
      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }

      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }

      header nav ul li a:hover {
        color: #2f80ed;
      }

      .user-profile-container {
        position: relative;
        display: inline-block;
      }

      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px;
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }

      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }

      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }

      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }

      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }

      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }

      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }

      /* Layout Elástico de Dos Columnas (Tabla + Carrito) */
      .shop-container {
        flex: 1;
        max-width: 1300px;
        width: 100%;
        margin: 40px auto;
        padding: 0 20px;
        display: flex;
        gap: 25px;
        align-items: flex-start;
      }

      @media (max-width: 1000px) {
        .shop-container {
          flex-direction: column;
        }
      }

      .left-panel {
        flex: 3;
        width: 100%;
      }

      .right-panel {
        flex: 1;
        width: 100%;
        position: sticky;
        top: 20px;
      }

      /* Botón Volver posicionado arriba (ESTILO UNIFICADO CON FLECHA SIMPLE) */
      .btn-back-container {
        margin-bottom: 20px;
        text-align: left;
      }

      .btn-back {
        text-decoration: none;
        color: #1e3264;
        font-weight: 600;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .page-title {
        color: #13213c;
        margin-top: 10px;
        margin-bottom: 25px;
        font-size: 28px;
        font-weight: 700;
      }
.filter-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(19, 33, 60, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #13213c;
      text-transform: uppercase;
    }

    .filter-input, .filter-select {
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      background-color: white;
      color: #334155;
    }

    .checkbox-filter-group {
      display: flex;
      gap: 15px;
      padding-bottom: 10px;
    }

      /* Tabla de Catálogo */
      .table-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 1px solid rgba(19, 33, 60, 0.1);
      }

      .table-container {
        overflow-x: auto;
      }

      .catalog-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        text-align: left;
      }

      .catalog-table th {
        background-color: #1e3264;
        color: white;
        padding: 14px;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }

      .catalog-table td {
        padding: 14px;
        border-bottom: 1px solid #e2e8f0;
        color: #334155;
      }

      /* Inputs y botones de compra en la fila */
      .input-qty {
        width: 55px;
        padding: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        text-align: center;
        font-size: 13px;
        outline: none;
      }
      .input-qty:focus {
        border-color: #2f80ed;
      }

      .btn-add-cart {
        background-color: #1e3264;
        color: white;
        border: none;
        padding: 6px 12px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .btn-add-cart:hover {
        background-color: #2f80ed;
      }

      /* Panel Lateral del Carrito */
      .cart-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(19, 33, 60, 0.1);
      }

      .cart-card h3 {
        margin-top: 0;
        color: #13213c;
        border-bottom: 2px solid #1e3264;
        padding-bottom: 10px;
        font-size: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 15px 0;
        max-height: 350px;
        overflow-y: auto;
        padding-right: 5px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        background: #f8fafc;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
      }

      .cart-item-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .cart-item-name {
        font-weight: 600;
        color: #1a202c;
      }

      .cart-item-meta {
        font-size: 11px;
        color: #64748b;
      }

      .btn-remove-item {
        background: none;
        border: none;
        color: #dc3545;
        font-size: 18px;
        cursor: pointer;
        padding: 0 5px;
        line-height: 1;
      }

      .cart-empty-msg {
        color: #64748b;
        font-size: 13px;
        text-align: center;
        padding: 20px 0;
        font-style: italic;
      }

      .cart-total-zone {
        border-top: 2px dashed #e2e8f0;
        padding-top: 15px;
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        color: #13213c;
        font-size: 16px;
      }

      .btn-confirm-order {
        width: 100%;
        background-color: #2e7d32;
        color: white;
        border: none;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 15px;
        box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
        transition: background-color 0.2s;
      }

      .btn-confirm-order:hover {
        background-color: #1b5e20;
      }

      .btn-confirm-order:disabled {
        background-color: #cbd5e1;
        color: #94a3b8;
        cursor: not-allowed;
        box-shadow: none;
      }

      /* Badges auxiliares para la tabla */
      .badge-prov {
        color: #1e3264;
        font-weight: 600;
      }
      .badge-cat {
        background-color: #f1f5f9;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        text-transform: capitalize;
      }
      .badge-y {
        background-color: #dcfce7;
        color: #166534;
        padding: 2px 5px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-n {
        background-color: #fee2e2;
        color: #991b1b;
        padding: 2px 5px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-c {
        background-color: #e0f2fe;
        color: #0369a1;
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 3px;
        display: inline-block;
      }

      /* Footer */
      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }
    </style>
  </head>

  <body
    style="
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background-color: #f8f9fa;
    "
  >
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div class="user-profile-container">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />
          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="shop-container">
      <div class="left-panel">
        <div class="btn-back-container">
          <a
            href="#"
            onclick="
              window.history.back();
              return false;
            "
            class="btn-back"
            >← Volver atrás</a
          >
        </div>

        <h2 class="page-title">Ordenar Productos Sostenibles</h2>
        <section class="filter-section">
          <div class="filter-grid">
            <div class="filter-group">
              <label for="searchProveedor">Filtrar por Proveedor:</label>
              <input
                type="text"
                id="searchProveedor"
                class="filter-input"
                placeholder="Ej: EcoProveedores..."
                onkeyup="filtrarTabla()"
              />
            </div>

            <div class="filter-group">
              <label for="selectCategoria">Categoría:</label>
              <select
                id="selectCategoria"
                class="filter-select"
                onchange="filtrarTabla()"
              >
                <option value="todos">Todas las categorías</option>
                <option value="papel">Papel</option>
                <option value="escritura">Escritura</option>
                <option value="embalaje">Embalaje</option>
              </select>
            </div>

            <div
              class="filter-group"
              style="flex-direction: row; gap: 20px; padding-bottom: 8px"
            >
              <label class="checkbox-label">
                <input
                  type="checkbox"
                  id="checkReciclable"
                  onchange="filtrarTabla()"
                />
                Reciclable
              </label>
              <label class="checkbox-label">
                <input
                  type="checkbox"
                  id="checkReutilizable"
                  onchange="filtrarTabla()"
                />
                Reutilizable
              </label>
            </div>
          </div>
        </section>

        <div class="table-card">
          <div class="table-container">
            <table class="catalog-table">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Proveedor</th>
                  <th>Precio</th>
                  <th>Categoría</th>
                  <th>Recic.</th>
                  <th>Reutil.</th>
                  <th>% Mat.</th>
                  <th>Certificaciones</th>
                  <th style="text-align: center; width: 130px">Cantidad</th>
                </tr>
              </thead>
              <tbody id="tbody-catalogo"></tbody>
            </table>
          </div>
        </div>
      </div>

      <aside class="right-panel">
        <div class="cart-card">
          <h3>
            <span>Carrito</span>
            <span
              id="cart-count"
              style="
                font-size: 13px;
                background: #1e3264;
                color: white;
                padding: 2px 8px;
                border-radius: 10px;
              "
              >0</span
            >
          </h3>

          <div id="cart-list" class="cart-list"></div>

          <div class="cart-total-zone">
            <span>Total Estimado:</span>
            <span id="cart-total">$0</span>
          </div>

          <button
            id="btn-confirm"
            class="btn-confirm-order"
            onclick="confirmarPedido()"
            disabled
          >
            Confirmar Orden de Compra
          </button>
        </div>
      </aside>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
      </div>
    </footer>

    <script src="../js/datosPlanos.js"></script>
    <script>
      // Variables de estado local del carrito
      let carrito = [];

      // 1. DROPDOWN UNIFICADO Y SELECTOR FIXED
      function toggleMenu() {
        const menu = document.getElementById("menuDropdown");
        menu.style.display =
          menu.style.display === "none" || menu.style.display === ""
            ? "block"
            : "none";
      }

      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("header nav img");

        if (
          menu &&
          menu.style.display === "block" &&
          event.target !== avatar &&
          !menu.contains(event.target)
        ) {
          menu.style.display = "none";
        }
      };

      // 2. INYECCIÓN DINÁMICA DEL CATÁLOGO DESDE DATOS PLANOS
      document.addEventListener("DOMContentLoaded", () => {
        const tbody = document.getElementById("tbody-catalogo");
        tbody.innerHTML = "";

        if (typeof PROVEEDORES !== "undefined" && PROVEEDORES.length > 0) {
          let contadorInput = 1;

          PROVEEDORES.forEach((proveedor) => {
            if (proveedor.productos && proveedor.productos.length > 0) {
              proveedor.productos.forEach((prod) => {
                const recBadge =
                  prod.reciclable === true
                    ? '<span class="badge-y">SÍ</span>'
                    : '<span class="badge-n">NO</span>';
                const reuBadge =
                  prod.reutilizable === true
                    ? '<span class="badge-y">SÍ</span>'
                    : '<span class="badge-n">NO</span>';

                let certsHtml = "-";
                if (prod.certificaciones && prod.certificaciones.length > 0) {
                  certsHtml = prod.certificaciones
                    .map((c) => `<span class="badge-c">${c}</span>`)
                    .join("");
                }

                const fila = document.createElement("tr");
                fila.innerHTML = `
                <td><strong>${prod.nombre}</strong></td>
                <td class="badge-prov">${proveedor.nombre}</td>
                <td><strong>$${prod.precio}</strong></td>
                <td><span class="badge-cat">${prod.categoria}</span></td>
                <td>${recBadge}</td>
                <td>${reuBadge}</td>
                <td>${prod.mat_reciclados_pct}%</td>
                <td>${certsHtml}</td>
                <td style="text-align: center; display: flex; gap: 6px; justify-content: center; align-items: center;">
                  <input type="number" id="qty-${contadorInput}" class="input-qty" value="1" min="1">
                  <button class="btn-add-cart" onclick="agregarAlCarrito('${prod.nombre.replace(/'/g, "\\'")}', ${prod.precio}, 'qty-${contadorInput}')">＋</button>
                </td>
              `;
                tbody.appendChild(fila);
                contadorInput++;
              });
            }
          });
        } else {
          tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color: red;">Error: No se pudieron cargar los productos de datosPlanos.js</td></tr>`;
        }

        renderCarrito();
      });

      // 3. LOGICA DEL CARRITO MANTENIDA Y OPTIMIZADA
      function agregarAlCarrito(nombre, precio, inputId) {
        const qtyInput = document.getElementById(inputId);
        const cantidad = parseInt(qtyInput.value);

        if (isNaN(cantidad) || cantidad < 1) {
          alert("Por favor ingrese una cantidad válida.");
          return;
        }

        const itemExistente = carrito.find((item) => item.nombre === nombre);
        if (itemExistente) {
          itemExistente.cantidad += cantidad;
        } else {
          carrito.push({ nombre, precio, cantidad });
        }

        qtyInput.value = 1;
        renderCarrito();
      }

      function eliminarDelCarrito(index) {
        carrito.splice(index, 1);
        renderCarrito();
      }

      function renderCarrito() {
        const cartListDiv = document.getElementById("cart-list");
        const totalSpan = document.getElementById("cart-total");
        const countSpan = document.getElementById("cart-count");
        const btnConfirm = document.getElementById("btn-confirm");

        cartListDiv.innerHTML = "";

        if (carrito.length === 0) {
          cartListDiv.innerHTML = `<div class="cart-empty-msg">No hay productos seleccionados</div>`;
          totalSpan.innerText = "$0";
          countSpan.innerText = "0";
          btnConfirm.disabled = true;
          return;
        }

        btnConfirm.disabled = false;
        let totalAcumulado = 0;
        let totalItems = 0;

        carrito.forEach((item, index) => {
          const subtotal = item.precio * item.cantidad;
          totalAcumulado += subtotal;
          totalItems += item.cantidad;

          const itemDiv = document.createElement("div");
          itemDiv.className = "cart-item";
          itemDiv.innerHTML = `
          <div class="cart-item-info">
            <span class="cart-item-name">${item.nombre}</span>
            <span class="cart-item-meta">${item.cantidad} x $${item.precio} — Subtotal: $${subtotal}</span>
          </div>
          <button class="btn-remove-item" onclick="eliminarDelCarrito(${index})">×</button>
        `;
          cartListDiv.appendChild(itemDiv);
        });

        totalSpan.innerText = "$" + totalAcumulado;
        countSpan.innerText = totalItems;
      }

      function confirmarPedido() {
        let resumenText = "ORDEN DE COMPRA (SIMULADA)\n\n";
        let totalAcumulado = 0;

        carrito.forEach((item) => {
          const subtotal = item.precio * item.cantidad;
          totalAcumulado += subtotal;
          resumenText += `• ${item.nombre} x${item.cantidad} -> $${subtotal}\n`;
        });

        resumenText += `\nTOTAL DE FACTURACIÓN: $${totalAcumulado}\n\nLa compra simulada fue aprobada.`;

        alert(resumenText);

        carrito = [];
        renderCarrito();
      }
    </script>
  </body>
</html>
