<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del Proveedor - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css"/>
    <style>
      /* Estilos del Logo */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }
      /* Estilos del Header */
      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }
      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }
      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }
      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }
      header nav ul li a:hover {
        color: #2f80ed;
      }
      /* Menu flotante del usuario */
      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px;
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }
      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }
      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }
      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }
      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }
      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }
      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }
      
      /* Contenedor de detalles */
      .detail-container {
        flex: 1;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        width: 100%;
      }
      .btn-back {
        display: inline-flex;
        align-items: center;
        margin-bottom: 20px;
        color: #1e3264;
        text-decoration: none;
        font-weight: 600;
        gap: 5px;
      }
      .btn-back:hover {
        color: #2f80ed;
      }
      .detail-card {
        background-color: #ffffff;
        padding: 40px;
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 20px;
        margin-bottom: 25px;
      }
      .detail-header h2 {
        font-size: 28px;
        color: #13213c;
        margin: 0 0 8px 0;
        font-weight: 700;
      }
      .btn-editar-simulado {
        padding: 8px 14px;
        border: 1px solid #cccccc;
        border-radius: 6px;
        background-color: #f5f5f5;
        color: #333333;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .btn-editar-simulado:hover {
        background-color: #e2e2e2;
      }
      .badge-score {
        color: white;
        padding: 6px 14px;
        border-radius: 6px;
        font-weight: 700;
        font-size: 15px;
        white-space: nowrap;
        display: inline-block;
      }
      .bg-verde { background-color: #219653; }
      .bg-amarillo { background-color: #f2c94c; color: #333333; }
      .bg-rojo { background-color: #eb5757; }

      .info-section {
        margin-bottom: 30px;
      }
      .info-section h3 {
        font-size: 14px;
        color: #1e3264;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
        border-left: 3px solid #2f80ed;
        padding-left: 10px;
        font-weight: 700;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        background-color: #f8fafb;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      .info-item label {
        display: block;
        font-size: 11px;
        color: #777777;
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      .info-item span {
        font-size: 15px;
        color: #333333;
        font-weight: 500;
      }
      .description-text {
        font-size: 15px;
        line-height: 1.6;
        color: #4f4f4f;
      }
      .cert-list {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .cert-badge {
        background-color: #e6f4ea;
        color: #137333;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid rgba(19, 115, 51, 0.1);
      }
      .no-certs {
        color: #888888;
        font-style: italic;
        font-size: 14px;
      }

      /* Inputs de Edición */
      .edit-input {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        color: #334155;
        outline: none;
        background-color: #ffffff;
        box-sizing: border-box;
      }
      .edit-input:focus {
        border-color: #2f80ed;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }
      .edit-score-input {
        width: 80px;
        padding: 6px 10px;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        color: #1e3264;
      }
      .error-message {
        text-align: center;
        padding: 40px;
        color: #eb5757;
        font-size: 18px;
      }
      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }
    </style>
  </head>

  <body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0; background-color: #f8f9fa;">
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div style="position: relative">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />

          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>
    
    <main class="detail-container">
      <a href="ranking.html" class="btn-back">
        ← Volver atrás
      </a>
      <article class="detail-card" id="detail-card-content">
        <div style="text-align: center; color: #666; padding: 20px;">Cargando información del proveedor...</div>
      </article>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>

    <script type="module">
      import { supabaseClient } from '../js/conexion-bd.js';

      const params = new URLSearchParams(window.location.search);
      const proveedorId = params.get("id");
      const cardContainer = document.getElementById("detail-card-content");

      let prov = null;
      let modoEdicion = false;

      // --- ASIGNAR MENÚ DESPLEGABLE GLOBAL PARA LOS MÓDULOS ---
      window.toggleMenu = function() {
        const menu = document.getElementById("menuDropdown");
        menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
      }
      
      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("header nav img");
        if (menu && menu.style.display === "block" && event.target !== avatar && !menu.contains(event.target)) {
          menu.style.display = "none";
        }
      };

      // --- CARGAR PROVEEDOR ---
      async function obtenerProveedor() {
        if (!proveedorId) {
          renderError("No se proporcionó un ID de proveedor válido.");
          return;
        }

        try {
          const { data, error } = await supabaseClient
            .from('proveedores_ucu')
            .select('*')
            .eq('id', proveedorId)
            .single();

          if (error || !data) {
            renderError("El identificador proporcionado no coincide con ningún registro.");
            return;
          }

          prov = data;
          renderProveedor();
        } catch (err) {
          console.error(err);
          renderError("Ocurrió un error al conectar con la base de datos.");
        }
      }

      function renderError(mensaje) {
        cardContainer.innerHTML = `
          <div class="error-message">
            <h3>Error al cargar</h3>
            <p>${mensaje}</p>
            <a href="ranking.html" class="btn-back" style="margin-top: 20px;">Volver al listado principal</a>
          </div>
        `;
      }

      function renderProveedor() {
        const puntajeActual = prov.puntaje_total || 0;

        let colorClase = "bg-rojo"; 
        if (puntajeActual >= 75) colorClase = "bg-verde";
        else if (puntajeActual >= 50) colorClase = "bg-amarillo";

        let certsHTML = `<div class="cert-list">`;
        let tieneCerts = false;

        if (prov.tiene_iso14001) { certsHTML += `<span class="cert-badge">✓ ISO 14001</span>`; tieneCerts = true; }
        if (prov.tiene_fsc) { certsHTML += `<span class="cert-badge">✓ Certificación FSC</span>`; tieneCerts = true; }
        if (prov.tiene_emas) { certsHTML += `<span class="cert-badge">✓ Registro EMAS</span>`; tieneCerts = true; }
        
        if (prov.urls_certificaciones && prov.urls_certificaciones.length > 0) {
          prov.urls_certificaciones.forEach((url, index) => {
            certsHTML += `<span class="cert-badge"><a href="${url}" target="_blank" style="color: inherit; text-decoration: underline;">Doc ${index + 1} 🔗</a></span>`;
            tieneCerts = true;
          });
        }

        certsHTML += `</div>`;

        if (!tieneCerts) {
          certsHTML = `<p class="no-certs">Este proveedor no cuenta con certificaciones ambientales activas.</p>`;
        }

        const procedenciaTexto = prov.procedencia ? prov.procedencia.toUpperCase() : "No especificado";
        const mayoristaTexto = prov.es_mayorista ? "Sí (Distribuidor Mayorista)" : "No (Minorista / Venta Directa)";
        const embalajeTexto = prov.embalaje_sostenible ? "Sí (Implementado)" : "No disponible";

        let fechaFormateada = "No disponible";
        if (prov.fecha_registro) {
          fechaFormateada = new Date(prov.fecha_registro).toLocaleDateString('es-UY', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        cardContainer.innerHTML = `
          <div class="detail-header">
            <div>
              <h2>${prov.nombre}</h2>
              <p style="color: #666; margin: 0; font-size: 14px;">Código: <strong>${prov.id_codigo}</strong> | Registrado el: ${fechaFormateada}</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
              <a href="agregar-producto-encargado.html?proveedorId=${prov.id}" 
                 id="btnAgregarProd"
                 style="text-decoration: none; padding: 8px 14px; background-color: #1e3264; color: white; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background-color 0.2s; ${modoEdicion ? 'display:none;' : ''}"
                 onmouseover="this.style.backgroundColor='#243b75'" 
                 onmouseout="this.style.backgroundColor='#1e3264'">
                ➕ Agregar Producto
              </a>
              
              <button class="btn-editar-simulado" id="btnEditarGuardar">
                ${modoEdicion ? "💾 Guardar Cambios" : "Editar Información"}
              </button>

              <div id="puntajeContenedor" style="display: flex; align-items: center; gap: 8px;">
                ${modoEdicion 
                  ? `<span style="font-size:12px; font-weight:bold; color:#1e3264;">Puntaje:</span><input type="number" id="inputPuntaje" class="edit-score-input" min="0" max="100" value="${puntajeActual}">` 
                  : `<span class="badge-score ${colorClase}">${puntajeActual} Puntos</span>`
                }
              </div>
            </div>
          </div>

          <div class="info-section">
            <h3>Descripción Comercial</h3>
            ${modoEdicion 
              ? `<textarea id="inputDescripcion" class="edit-input" style="height:80px; resize:vertical;">${prov.descripcion || ''}</textarea>` 
              : `<p class="description-text">${prov.descripcion || "Sin descripción disponible."}</p>`
            }
          </div>

          <div class="info-section">
            <h3>Información de Contacto y Operación</h3>
            <div class="info-grid">
              <div class="info-item">
                <label>Representante</label>
                ${modoEdicion ? `<input type="text" id="inputContacto" class="edit-input" value="${prov.contacto_persona || ''}">` : `<span>${prov.contacto_persona || "No asignado"}</span>`}
              </div>
              <div class="info-item">
                <label>Correo Electrónico</label>
                ${modoEdicion ? `<input type="email" id="inputEmail" class="edit-input" value="${prov.email || ''}">` : `<span>${prov.email || "No asignado"}</span>`}
              </div>
              <div class="info-item">
                <label>Teléfono</label>
                ${modoEdicion ? `<input type="text" id="inputTelefono" class="edit-input" value="${prov.telefono || ''}">` : `<span>${prov.telefono || "No asignado"}</span>`}
              </div>
              <div class="info-item">
                <label>Procedencia</label>
                ${modoEdicion 
                  ? `
                    <select id="inputProcedencia" class="edit-input">
                      <option value="nacional" ${prov.procedencia === 'nacional' ? 'selected' : ''}>Nacional</option>
                      <option value="internacional" ${prov.procedencia === 'internacional' ? 'selected' : ''}>Internacional</option>
                    </select>
                    `
                  : `<span>${procedenciaTexto}</span>`
                }
              </div>
              <div class="info-item">
                <label>RUT / Identificación</label>
                ${modoEdicion ? `<input type="text" id="inputRut" class="edit-input" value="${prov.rut || ''}">` : `<span>${prov.rut || "No disponible"}</span>`}
              </div>
              <div class="info-item">
                <label>Tipo de Comercio</label>
                ${modoEdicion 
                  ? `
                    <select id="inputMayorista" class="edit-input">
                      <option value="true" ${prov.es_mayorista ? 'selected' : ''}>Mayorista</option>
                      <option value="false" ${!prov.es_mayorista ? 'selected' : ''}>Minorista / Directo</option>
                    </select>
                    `
                  : `<span>${mayoristaTexto}</span>`
                }
              </div>
              <div class="info-item" style="grid-column: span 2;">
                <label>Sitio Web</label>
                ${modoEdicion ? `<input type="text" id="inputSitioWeb" class="edit-input" value="${prov.sitio_web || ''}">` : `<span>${prov.sitio_web ? `<a href="${prov.sitio_web}" target="_blank">${prov.sitio_web}</a>` : "No disponible"}</span>`}
              </div>
            </div>
          </div>

          <div class="info-section">
            <h3>Criterios de Sostenibilidad</h3>
            <div class="info-grid" style="background-color: #f1f8ff; border-color: rgba(47, 128, 237, 0.1);">
              <div class="info-item">
                <label>Embalaje Sostenible</label>
                ${modoEdicion 
                  ? `
                    <select id="inputEmbalaje" class="edit-input">
                      <option value="true" ${prov.embalaje_sostenible ? 'selected' : ''}>Sí (Implementado)</option>
                      <option value="false" ${!prov.embalaje_sostenible ? 'selected' : ''}>No disponible</option>
                    </select>
                    ` 
                  : `<span>${embalajeTexto}</span>`
                }
              </div>
              <div class="info-item">
                <label>Estado en Sistema</label>
                <span>${(prov.estado || 'pendiente').toUpperCase()} (${prov.tipo || 'postulacion'})</span>
              </div>
            </div>
          </div>

          <div class="info-section">
            <h3>Certificaciones Oficiales</h3>
            ${certsHTML}
          </div>
        `;

        // RE-VINCULAMOS EL EVENTO AQUÍ ADENTRO SIEMPRE QUE SE RENDERIZA
        document.getElementById("btnEditarGuardar").addEventListener("click", toggleModoEdicion);
      }

      async function toggleModoEdicion() {
        if (modoEdicion) {
          const nuevoPuntaje = parseFloat(document.getElementById("inputPuntaje").value);
          
          if (isNaN(nuevoPuntaje) || nuevoPuntaje < 0 || nuevoPuntaje > 100) {
            alert("Por favor, asigne un puntaje manual válido entre 0 y 100.");
            return;
          }

          const btn = document.getElementById("btnEditarGuardar");
          btn.innerText = "⏳ Guardando...";
          btn.disabled = true;

          const actualizaciones = {
            puntaje_total: nuevoPuntaje,
            descripcion: document.getElementById("inputDescripcion").value,
            contacto_persona: document.getElementById("inputContacto").value,
            email: document.getElementById("inputEmail").value,
            telefono: document.getElementById("inputTelefono").value,
            procedencia: document.getElementById("inputProcedencia").value,
            rut: document.getElementById("inputRut").value || null,
            es_mayorista: document.getElementById("inputMayorista").value === "true",
            sitio_web: document.getElementById("inputSitioWeb").value || null,
            embalaje_sostenible: document.getElementById("inputEmbalaje").value === "true"
          };

          try {
            const { error } = await supabaseClient
              .from('proveedores_ucu')
              .update(actualizaciones)
              .eq('id', proveedorId);

            if (error) throw error;

            prov = { ...prov, ...actualizaciones };
            modoEdicion = false;
            alert("Información actualizada correctamente en Supabase.");
            renderProveedor();
          } catch (err) {
            console.error(err);
            alert("Error al intentar guardar los cambios.");
            btn.innerText = "💾 Guardar Cambios";
            btn.disabled = false;
          }
        } else {
          modoEdicion = true;
          renderProveedor();
        }
      }

      document.addEventListener("DOMContentLoaded", obtenerProveedor);
    </script>
  </body>
</html>
