<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Añadir Producto al Catálogo - UCU</title>
  <link rel="stylesheet" href="../css/global-styles.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #f4f6f9;
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .form-container {
      flex: 1;
      max-width: 600px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
    }

    .btn-back-container {
      margin-bottom: 15px;
      text-align: left;
    }

    .btn-back {
      color: #1e3264;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #1e3264;
      padding: 8px 16px;
      border-radius: 6px;
      transition: background-color 0.2s, color 0.2s;
      display: inline-block;
    }

    .btn-back:hover {
      background-color: #1e3264;
      color: white;
    }

    .form-card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
    }

    .form-card h2 {
      margin-top: 0;
      color: #1e3264;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .form-card p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .provider-badge-info {
      background-color: #f1f5f9;
      border-left: 4px solid #1e3264;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      color: #1e3264;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    .form-control {
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      background-color: #ffffff;
    }

    .form-control:focus {
      outline: none;
      border-color: #1e3264;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 5px 0 15px 0;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #334155;
      cursor: pointer;
    }

    .checkbox-label input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      background-color: #1e3264;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background-color: #173a73;
    }

    .form-control::file-selector-button {
      background: rgba(30, 50, 100, 0.1);
      color: #1e3264;
      border: none;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
      margin-right: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .footer-container {
      background-color: #1e3264;
      padding: 20px 0;
      width: 100%;
      margin-top: auto;
    }

    .logo-footer {
      display: block;
      margin: auto;
      height: 30px;
      filter: brightness(0) invert(1);
    }
  </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0; background-color: #f4f6f9;">

  <main class="form-container">
    <div class="btn-back-container">
      <a href="../index.html" class="btn-back">← Volver al Inicio</a>
    </div>

    <div class="form-card">
      <h2>Postular Nuevo Producto</h2>
      <p>Complete los datos del producto para enviarlo a revisión por el equipo de compras.</p>

      <div id="infoProveedor" class="provider-badge-info">
        Cargando cuenta de proveedor...
      </div>

      <form id="formProducto" onsubmit="enviarProductoReal(event)">
        <div class="form-group">
          <label for="prodNombre">Nombre del Producto *</label>
          <input type="text" id="prodNombre" class="form-control" placeholder="Ej: Caja de Cartón Corrugado A4" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="prodPrecio">Precio (UYU) *</label>
            <input type="number" id="prodPrecio" class="form-control" placeholder="Monto en pesos" min="1" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="prodCategoria">Categoría *</label>
            <select id="prodCategoria" class="form-control" required>
              <option value="" disabled selected>Seleccione...</option>
              <option value="papel">Papel</option>
              <option value="escritura">Escritura</option>
              <option value="embalaje">Embalaje</option>
              <option value="archivo">Archivo / Organización</option>
            </select>
          </div>
        </div>

        <fieldset class="form-group" style="border: none; padding: 0; margin: 0 0 20px 0;">
          <legend style="font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 6px;">Atributos Ecológicos:</legend>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="prodReciclable"> ¿Es Reciclable?
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="prodReutilizable"> ¿Es Reutilizable?
            </label>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="prodPct">% Materiales Reciclados</label>
          <input type="number" id="prodPct" class="form-control" placeholder="0 a 100" min="0" max="100" value="0">
        </div>

        <fieldset class="form-group" style="border: none; padding: 0; margin: 0 0 20px 0;">
          <legend style="font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 6px;">Certificaciones del Producto:</legend>
          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" name="prodCertificaciones" value="FSC"> FSC</label>
            <label class="checkbox-label"><input type="checkbox" name="prodCertificaciones" value="ISO14001"> ISO 14001</label>
            <label class="checkbox-label"><input type="checkbox" name="prodCertificaciones" value="B-Corp"> B-Corp</label>
            <label class="checkbox-label"><input type="checkbox" name="prodCertificaciones" value="Ecolabel"> Ecolabel</label>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="prodPdf">Certificados del Producto (PDF):</label>
          <input type="file" id="prodPdf" accept=".pdf" class="form-control">
        </div>

        <button type="submit" id="btnSubmitForm" class="btn-submit">Enviar Producto a Revisión</button>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer">
    </div>
  </footer>

  <script type="module">
    // CORRECCIÓN CLAVE: Migrado a type="module" e importación nativa
    import { supabaseClient } from '../js/conexion-bd.js';

    let uuidProveedorActivo = null;
    let nombreProveedorActivo = "Proveedor Registrado";

    document.addEventListener("DOMContentLoaded", async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const provCodigo = urlParams.get('prov');
      const infoBox = document.getElementById("infoProveedor");

      if (!provCodigo) {
        infoBox.innerHTML = `<strong>Modo Incógnito:</strong> No se detectó código de verificación.`;
        infoBox.style.borderColor = "#dc3545";
        return;
      }

      try {
        const { data: proveedor, error } = await supabaseClient
          .from('proveedores_ucu')
          .select('id, nombre, id_codigo')
          .eq('id_codigo', provCodigo.toUpperCase())
          .single();

        if (error || !proveedor) {
          infoBox.innerHTML = `<strong>Código Inválido:</strong> El código ${provCodigo} no pertenece a ningún proveedor aprobado.`;
          infoBox.style.borderColor = "#dc3545";
        } else {
          uuidProveedorActivo = proveedor.id; 
          nombreProveedorActivo = proveedor.nombre;
          infoBox.innerHTML = `<strong>Proveedor:</strong> ${proveedor.nombre} <span style="color:#64748b;">(${proveedor.id_codigo})</span>`;
        }
      } catch (err) {
        console.error("Error al cargar la información del proveedor:", err);
        infoBox.innerHTML = `<strong>Error:</strong> Error al conectar con el servidor de base de datos.`;
      }
    });

    // CORRECCIÓN CLAVE: Se expone la función al objeto global window para mapear con onsubmit
    window.enviarProductoReal = async function(event) {
      event.preventDefault();
      
      if (!uuidProveedorActivo) {
        alert("Error: No puedes registrar productos sin una sesión de proveedor válida.");
        return;
      }

      const btnSubmit = document.getElementById("btnSubmitForm");
      btnSubmit.disabled = true;
      btnSubmit.textContent = "Transmitiendo datos...";

      const nombre = document.getElementById("prodNombre").value.trim();
      const precio = parseFloat(document.getElementById("prodPrecio").value);
      const categoria = document.getElementById("prodCategoria").value;
      const esReciclable = document.getElementById("prodReciclable").checked;
      const esReusable = document.getElementById("prodReutilizable").checked;
      const pctMatReciclado = parseInt(document.getElementById("prodPct").value) || 0;

      try {
        // AJUSTE CRÍTICO: Sobrescribimos el default insertando explícitamente el estado 'pendiente'
        const { error } = await supabaseClient
          .from('productos_ucu')
          .insert([
            {
              proveedor_id: uuidProveedorActivo, 
              nombre: nombre,
              categoria: categoria,
              precio: precio,
              mat_reciclados_pct: pctMatReciclado,
              es_reciclable: esReciclable,
              es_reusable: esReusable,
              estado: 'pendiente' 
            }
          ]);

        if (error) throw error;

        alert(`¡Producto "${nombre}" enviado con éxito a la cola de auditoría del Encargado de Compras!`);
        document.getElementById("formProducto").reset();
        window.location.href = "../index.html";

      } catch (err) {
        console.error("Error de Supabase al insertar producto:", err);
        alert("Hubo un problema al guardar el producto en la base de datos: " + err.message);
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Enviar Producto a Revisión";
      }
    };
  </script>
</body>
</html>
