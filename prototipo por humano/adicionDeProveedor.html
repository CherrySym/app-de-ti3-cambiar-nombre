<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Añadir Proveedor</title>
    <link rel="stylesheet" href="./css/global-styles.css"/>
    <style>
      /* Estilos para el logo del header */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1); /* Hace que el logo se vea blanco*/
      }
      /* Estilos del Header */
      header {
        background-color: #1E3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between; /* Título a la izquierda, Menú a la derecha */
        align-items: center; /* Centra verticalmente los textos */
        color: white;
      }
      /* Estilos para que los enlaces y el avatar del nav estén en la misma línea */
      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      /* Estilos del menu de enlaces */
      header nav ul {
        list-style: none; /* Le quita los puntitos negros a la lista */
        margin: 0;
        padding: 0;
        display: flex; /* Hace que los <li> se pongan uno al lado del otro */
        gap: 20px; /* Separa los enlaces entre sí */
      }
      /* Estilos de los enlaces */
      header nav ul li a {
        text-decoration: none; /* Le quita el subrayado */
        color: #ffffff;
        font-weight: 500;
      }
      /* Cambio de color al pasar el mouse por los enlaces del nav */
      header nav ul li a:hover {
        color: #007bff;
      }
      /* Estilos para el contenedor del menu flotante que aparece al hacer click en el icono de usuario */
      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px; /* Se posiciona justo abajo de la imagen */
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 6px;
        padding: 12px 0;
        z-index: 1000;
      }
      /* Estilos para la sección interna con el nombre y mail del usuario */

      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }
      /* Texto en negrita para el nombre del usuario */
      .dropdown-user-info strong {
        font-size: 14px;
        color: #333333;
      }
      /* Texto gris y más chico para el correo */
      .dropdown-user-info span {
        font-size: 12px;
        color: #777777;
      }
      /* Línea divisoria del menú desplegable */
      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }
      /* Estilos para el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }
      /* Cambio de color al pasar el mouse por el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }
      /* Estilos para el contenedor del formulario */
      .form-container {
        flex: 1;
        max-width: 750px; 
        margin: 40px auto; 
        padding: 0 20px;
      }
      /* Estilos de la tarjeta del formulario */
      .form-card {
        background-color: #ffffff;
        padding: 35px;
        border-radius: 6px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); /* Sombra sutil para despegarlo del fondo */
      }
      /* Estilos para el título del formulario */
      .form-card h2 {
        font-size: 24px;
        color: #1E3264;
        margin-bottom: 25px;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
      }

      /* Estilo para las filas del formulario para poner inputs en paralelo */
      .form-row {
        display: flex;
        gap: 20px;
      }
      /* Hace que los elementos de la misma fila midan lo mismo */
      .form-row .form-group {
        flex: 1; 
      }
      /* Contenedor vertical para cada etiqueta e input */
      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
      }
      /* Estilos para las etiquetas de los campos */
      .form-group label {
        font-weight: 500;
        color: #333333;
        margin-bottom: 8px;
        font-size: 14px;
      }

      /* Estilo unificado para los inputs, selects y textareas */
      .form-input, .form-select, .form-textarea {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        background-color: #ffffff;
      }
      /* Cambio de color de borde cuando el input está activo */
      .form-input:focus, .form-select:focus, .form-textarea:focus {
        border-color: #007bff;
        outline: none;
      }

      /* Estilos del contenedor para los Checkboxes múltiples */
      .checkbox-group {
        display: flex;
        gap: 25px;
        margin-top: 5px;
      }
      /* Estilos para las etiquetas que envuelven a cada checkbox */
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 400;
        cursor: pointer;
      }
      /* Estilos para los cuadros de texto largo */
      .form-textarea {
        resize: vertical; 
        min-height: 80px;
      }

      /* Estilos del botón para enviar el formulario */
      .btn-submit-prov {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s;
        margin-top: 10px;
      }
      /* Cambio de color al pasar el mouse por el botón de guardar */
      .btn-submit-prov:hover {
        background-color: #0056b3;
      }

      /* Estilos del Footer */
      .footer-container {
        background-color: #1E3264; 
        padding: 20px 0; 
        width: 100%;
      }
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1); /* Hace que el logo se vea blancoo */
      }
    </style>
  </head>

  <body>
        <header>
      <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <ul>
          <li><a href="landing.html">Inicio</a></li>
          <li><a href="lista-de-proveedores.html">Lista de Proveedores</a></li>          
          <li><a href="adicionDeProveedor.html">Añadir Proveedor</a></li>
        </ul>
        <div style="position: relative">
          <img
            src="./assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />
          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="form-container">
      <section class="form-card">
        <div style="margin-bottom: 20px;">
          <a href="#" onclick="window.history.back(); return false;" style="text-decoration: none; color: #007bff; font-weight: 500; display: inline-flex; align-items: center; gap: 5px;">
             ← Volver atrás
            </a>
        </div>
        <h2>Registrar Nuevo Proveedor</h2>
        
        <form action="ranking.html">
          
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre de la Empresa:</label>
              <input type="text" id="nombre" required class="form-input" placeholder="Ej: EcoProveedores UY Ltda.">
            </div>
            <div class="form-group">
              <label for="contacto">Persona de Contacto:</label>
              <input type="text" id="contacto" required class="form-input" placeholder="Ej: Valentina Rocha">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Correo Electrónico:</label>
              <input type="email" id="email" required class="form-input" placeholder="contacto@empresa.com.uy">
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono de Contacto:</label>
              <input type="tel" id="telefono" required class="form-input" placeholder="Ej: +598 2 410 8800">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cobertura">Cobertura de Logística:</label>
              <select id="cobertura" class="form-select">
                <option value="local">Local (Nacional)</option>
                <option value="importado">Importado (Internacional)</option>
                <option value="ambos">Ambos</option>
              </select>
            </div>
            <div class="form-group">
              <label for="mat_reciclados_pct">Materiales Reciclados (%):</label>
              <input type="number" id="mat_reciclados_pct" min="0" max="100" class="form-input" placeholder="Ej: 80">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="embalaje_sostenible">¿Utiliza Embalaje Sostenible?:</label>
              <select id="embalaje_sostenible" class="form-select">
                <option value="si">Sí</option>
                <option value="no">No</option>
                <option value="parcial">Parcial</option>
              </select>
            </div>
            <div class="form-group">
              <label for="energia_renovable">¿Utiliza Energía Renovable?:</label>
              <select id="energia_renovable" class="form-select">
                <option value="si">Sí</option>
                <option value="no">No</option>
                <option value="parcial">Parcial</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Certificaciones de la Empresa:</label>
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" name="certificaciones" value="ISO14001"> ISO 14001</label>
              <label class="checkbox-label"><input type="checkbox" name="certificaciones" value="FSC"> FSC</label>
              <label class="checkbox-label"><input type="checkbox" name="certificaciones" value="EMAS"> EMAS</label>
            </div>
          </div>

          <div class="form-group">
            <label for="pdf_certificados">Adjuntar Comprobantes de Certificación (Formato PDF):</label>
            <input type="file" id="pdf_certificados" accept=".pdf" class="form-input">
          </div>

          <div class="form-group">
            <label for="descripcion">Descripción Comercial:</label>
            <textarea id="descripcion" class="form-textarea" placeholder="Breve reseña sobre la empresa y sus materiales..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="desafios">Desafíos de Sostenibilidad:</label>
              <textarea id="desafios" class="form-textarea" placeholder="¿Qué dificultades enfrenta la empresa actualmente?"></textarea>
            </div>
            <div class="form-group">
              <label for="metas">Metas a Futuro:</label>
              <textarea id="metas" class="form-textarea" placeholder="Ej: Reducir packaging plástico al 50% para 2027"></textarea>
            </div>
          </div>

          <button type="submit" class="btn-submit-prov">Guardar Proveedor</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>
        <script>
      // Función para mostrar/ocultar el menú desplegable al hacer clic en la imagen de perfil
      function toggleMenu() {
        const menu = document.getElementById("menuDropdown");
        if (menu.style.display === "none" || menu.style.display === "") {
          menu.style.display = "block";
        } else {
          menu.style.display = "none";
        }
      }
      // Función para ocultar el menú desplegable si se hace clic fuera de él (me gusta que haga eso)
      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("nav div img");

        if (event.target !== avatar && !menu.contains(event.target)) {
          menu.style.display = "none";
        }
      };
    </script>
  </body>
</html>
