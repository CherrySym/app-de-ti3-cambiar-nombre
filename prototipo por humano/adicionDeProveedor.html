<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Añadir Proveedor</title>
    <link rel="stylesheet" href="./css/global-styles.css"/>
    <style>
      /* Estilos del Header */
      header {
        background-color: #1E3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between; /* Título a la izquierda, Menú a la derecha */
        align-items: center; /* Centra verticalmente los textos */
        color: white;
      }

      /* Estilos del menu de enlaces */
      header nav ul {
        list-style: none; /* Le quita los puntitos negros a la lista */
        margin: 0;
        padding: 0;
        display: flex; /* Hace que los <li> se pongan uno al lado del otro */
        gap: 20px; /* Separa los enlaces entre sí */
      }
      /* Estilos de los enlaces */
      header nav ul li a {
        text-decoration: none; /* Le quita el subrayado */
        color: #ffffff;
        font-weight: 500;
      }
      /*Estilos adicionales de los enlaces para el estado hover */
      header nav ul li a:hover {
        color: #007bff; /* Cambia a azul cuando pasás el mouse por encima */
      }
      .footer-container {
        background-color: #1E3264; /* Un gris oscuro elegante o el azul oscuro de la UCU */
        padding: 20px 0; /* Un poquito más de aire arriba y abajo */
        width: 100%;
      }
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1); /* TRUCO PRO: Si el logo es negro, esto lo vuelve 100% blanco para que resalte sobre el fondo oscuro */
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Añadir Proveedor</h1>
      <nav>
        <ul>
          <li><a href="landing.html">Inicio</a></li>
          <li><a href="adicionDeProveedor.html">Añadir Proveedor</a></li>
          <li><a href="ranking.html">Ranking de Proveedores</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <div style="text-align: center">
          <img src="./assets/Jerboa.jpg" height="600px" />
        </div>
      </section>

      <section></section>

      <section></section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>
  </body>
</html>
