<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proveedores de UCU</title>
  <link rel="stylesheet" href="./css/global-styles.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: url('./assets/fondo-ucu.jpeg') no-repeat center top fixed;
      background-size: cover;
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-container {
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px 20px;
    }

    .main-container h1 {
      color: #1e3264;
      font-size: 48px;
      margin-top: 40px;      
      margin-bottom: auto;  
      text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
    }
    
    .main-container h3 {
      color: #444;
      font-size: 24px;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
      margin-bottom: 30px;
    }
    
    /* Contenedor principal de flujos */
    .buttons-container {
      display: flex;
      flex-direction: row;   
      justify-content: center;
      align-items: flex-start;
      gap: 25px;            
      width: 100%;
      max-width: 700px;
      margin-bottom: auto;   
    }

    /* Sub-bloque vertical exclusivo para las opciones de proveedores */
    .provider-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 240px;
    }

    .provider-label {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      color: #1e3264;
      text-transform: uppercase;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
      margin-bottom: 2px;
    }

    .btn-acceso {
      background-color: #1e3264;
      color: white;
      border: none;
      padding: 14px 28px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none; 
      font-weight: 600;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(30, 50, 100, 0.3);
      transition: transform 0.2s, background-color 0.2s;
      display: inline-block;
      text-align: center;
      min-width: 240px;
    }

    .btn-acceso.btn-secondary {
      background-color: #ffffff;
      color: #1e3264;
      border: 2px solid #1e3264;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .btn-acceso:hover {
      background-color: #173a73;
      transform: translateY(-2px);
    }

    .btn-acceso.btn-secondary:hover {
      background-color: #f4f6f9;
      color: #173a73;
    }

    /* ESTILOS DEL ACCESO REFINADO (MODAL INTERNO) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(19, 33, 60, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .modal-card h4 {
      margin: 0 0 10px 0;
      color: #1e3264;
      font-size: 18px;
    }

    .modal-card p {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      font-size: 15px;
      text-align: center;
      margin-bottom: 15px;
      outline: none;
    }

    .modal-input:focus {
      border-color: #1e3264;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-modal {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .btn-modal-confirm { background-color: #1e3264; color: white; }
    .btn-modal-cancel { background-color: #e2e8f0; color: #475569; }

    .error-msg {
      color: #dc3545;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }

    footer {
      margin-top: auto;
      width: 100%;
    }

    .footer-container {
      background-color: #1e3264;
      padding: 20px 0;
      width: 100%;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-footer {
      display: block;
      margin: auto;
      height: 30px;
      filter: brightness(0) invert(1);
    }

    @media (max-width: 600px) {
      .buttons-container {
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      .provider-block {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <main class="main-container">
    <h1>Bienvenido</h1>
    <h3>Selecciona una opción para continuar</h3>
    
    <div class="buttons-container">
      
      <div class="provider-block">
        <div class="provider-label">Espacio Proveedores</div>
        <a href="./vista-proveedor/postulacion.html" class="btn-acceso">Postularme a la Red</a>
        <button onclick="abrirModal()" class="btn-acceso btn-secondary" style="font-size: 14px; padding: 12px 20px;">Agregar Producto</button>
      </div>

      <div class="provider-block">
        <div class="provider-label">Encargado UCU</div>
        <a href="login.html" class="btn-acceso" style="margin-top: 24px;">Ingreso Gestión de Compras</a>
      </div>

    </div>
  </main>

  <div id="modalAcceso" class="modal-overlay">
    <div class="modal-card">
      <h4>Validación de Proveedor</h4>
      <p>Introduce tu código de verificación asignado por la UCU.</p>
      
      <input type="text" id="codigoProveedor" class="modal-input" placeholder="Ej: PROV-001" autocomplete="off">
      <div id="errorAcceso" class="error-msg">Código incorrecto. Intenta de nuevo.</div>
      
      <div class="modal-buttons">
        <button onclick="cerrarModal()" class="btn-modal btn-modal-cancel">Cancelar</button>
        <button onclick="validarYRedirigir()" class="btn-modal btn-modal-confirm">Ingresar</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-container">
      <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
    </div>
  </footer>

  <script>
    // Control visual del modal integrado
    function abrirModal() {
      document.getElementById("modalAcceso").classList.add("active");
      document.getElementById("codigoProveedor").focus();
      document.getElementById("errorAcceso").style.display = "none";
    }

    function cerrarModal() {
      document.getElementById("modalAcceso").classList.remove("active");
      document.getElementById("codigoProveedor").value = "";
    }

    // Validación segura a prueba de fallos de carga JS externos
    function validarYRedirigir() {
  const codigo = document.getElementById("codigoProveedor").value.trim().toUpperCase();
  const inputError = document.getElementById("errorAcceso");

  if (typeof PROVEEDORES !== 'undefined') {
    // Buscamos usando p.codigo en lugar de id_proveedor
    const proveedorExistente = PROVEEDORES.find(p => p.codigo && p.codigo.toUpperCase() === codigo);

    if (proveedorExistente) {
      cerrarModal();
      // Le pasamos el código real de la BD por la URL
      window.location.href = "./vista-proveedor/agregar-producto-proveedor.html?prov=" + proveedorExistente.codigo;
    } else {
      inputError.style.display = "block";
      document.getElementById("codigoProveedor").value = "";
    }
  } else {
    // Resguardo por si las moscas
    if (codigo === "PROV-001") {
      cerrarModal();
      window.location.href = "./vista-proveedor/agregar-producto-proveedor.html?prov=PROV-001";
    } else {
      inputError.style.display = "block";
    }
  }
}

    // Permitir ingresar tocando "Enter" en el input
    document.getElementById("codigoProveedor").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        validarYRedirigir();
      }
    });
  </script>
</body>
</html>
