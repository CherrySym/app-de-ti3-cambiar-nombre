<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking de Proveedores</title>
    <link rel="stylesheet" href="./css/global-styles.css"/>
    <style>
      /* Estilos para el logo del Header */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }
      
      /* Estilos del Header */
      header {
        background-color: #1E3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }

      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }

      header nav ul li a:hover {
        color: #007bff;
      }

      /*  Estilos del contenedor del ranking  */
      .ranking-container {
        flex: 1;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
        width: 100%;
      }

      .ranking-container h2 {
        font-size: 24px;
        color: #1E3264;
        margin-bottom: 8px;
      }

      .ranking-container p {
        color: #666666;
        font-size: 14px;
        margin-bottom: 25px;
      }

      /* Contenedor de la tabla para que tenga bordes lindos */
      .table-responsive {
        background-color: #ffffff;
        border-radius: 6px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        overflow: hidden; /* Corta las esquinas de la tabla para que se adapten al border-radius */
      }

      table {
        width: 100%;
        border-collapse: collapse; /* Elimina doble espacio entre celdas */
        text-align: left;
        font-size: 15px;
      }

      th {
        background-color: #1E3264;
        color: white;
        padding: 15px;
        font-weight: 600;
      }

      td {
        padding: 15px;
        border-bottom: 1px solid #eeeeee;
        color: #333333;
      }

      /* Efecto cebra: filas alternas con gris muy claro */
      tr:nth-child(even) td {
        background-color: #f9f9f9;
      }

      /* Hover para resaltar la fila donde pasa el mouse */
      tr:hover td {
        background-color: #f1f5f9;
      }

      /* Estilo para la insignia del puntaje */
      .badge-score {
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 13px;
      }
      .bg-verde { background-color: #28a745; }
      .bg-amarillo { background-color: #ffc107; color: #333333; } /* Texto oscuro para que se lea bien */
      .bg-rojo { background-color: #dc3545; }

      /* Link de Ver Detalle transformado en un boton sutil */
      .btn-detail {
        color: #007bff;
        text-decoration: none;
        font-weight: 500;
      }

      .btn-detail:hover {
        text-decoration: underline;
      }

      /* Estilos del Footer */
      .footer-container {
        background-color: #1E3264;
        padding: 20px 0;
        width: 100%;
      }
      
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }
    </style>
  </head>

  <body>
    <header>
      <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo"/>
      <nav>
        <ul>
          <li><a href="landing.html">Inicio</a></li>
          <li><a href="adicionDeProveedor.html">Añadir Proveedor</a></li>
          <li><a href="ranking.html">Ranking de Proveedores</a></li>
        </ul>
      </nav>
    </header>

    <main class="ranking-container">
      <h2>Ranking de Sostenibilidad</h2>
      <p>Proveedores ordenados por su puntaje de cumplimiento ambiental e institucional.</p>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Proveedor</th>
              <th>Puntaje</th>
              <th>Cobertura</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            </tbody>
        </table>
      </div>
    </main>

    <footer>
      <div class="footer-container">
        <img src="./assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>

    <script src="./js/datosPlanos.js"></script>
    <script>
      const tbody = document.getElementById("tabla-body");

      /* Ordenar los proveedores de mayor a menor puntaje */
      const proveedoresOrdenados = [...PROVEEDORES].sort((a, b) => b.puntaje - a.puntaje);

      proveedoresOrdenados.forEach(p => {
        const fila = document.createElement("tr");
        
        // Determinar el color del puntaje según el valor
        let colorClase = "bg-rojo"; // Menor a 50
        if (p.puntaje >= 75) {
          colorClase = "bg-verde";
        } else if (p.puntaje >= 50) {
          colorClase = "bg-amarillo";
        }

        const coberturaFormateada = p.cobertura.charAt(0).toUpperCase() + p.cobertura.slice(1);

        fila.innerHTML = `
          <td><strong>${p.nombre}</strong></td>
          <td><span class="badge-score ${colorClase}">${p.puntaje} pts</span></td>
          <td>${coberturaFormateada}</td>
          <td><a href="detallesDeProveedor.html?id=${p.id}" class="btn-detail">Ver detalle →</a></td>
        `;
        tbody.appendChild(fila);
      });
    </script>
  </body>
</html>
