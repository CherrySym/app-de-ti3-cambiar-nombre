<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Añadir Insumo Sostenible - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background-color: #f4f6f9;
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }
      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }
      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }
      header nav ul li a:hover {
        color: #2f80ed;
      }

      .user-profile-container {
        position: relative;
        display: inline-block;
      }
      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px;
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }
      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }
      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }
      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }
      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }
      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }
      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }

      /* Layout del Formulario */
      .form-container {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .form-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 24px;
        padding: 35px;
        width: 100%;
        max-width: 750px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }

      .form-card h2 {
        color: #13213c;
        font-size: 28px;
        margin-top: 10px;
        margin-bottom: 25px;
        font-weight: 700;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
      }

      .form-row {
        display: flex;
        gap: 20px;
        width: 100%;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        flex: 1;
      }
      .form-group label {
        font-weight: 600;
        color: #13213c;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .form-input,
      .form-select {
        padding: 12px 16px;
        border: 1px solid rgba(19, 33, 60, 0.2);
        border-radius: 8px;
        font-size: 15px;
        background-color: #ffffff;
        color: #333333;
        outline: none;
        width: 100%;
        transition: all 0.2s;
      }

      .form-input:focus,
      .form-select:focus {
        border-color: #2f80ed;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }

      /* Estiliza el botón de subida de archivos */
      .form-input::file-selector-button {
        background: rgba(30, 50, 100, 0.1);
        color: #1e3264;
        border: none;
        padding: 4px 10px;
        border-radius: 999px;
        font-weight: 600;
        margin-right: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      /* Grupo de Checkbox */
      .checkbox-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
        flex-wrap: wrap;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500;
        cursor: pointer;
        color: #4f5e7b;
      }
      .checkbox-label input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .btn-submit-prod {
        background: linear-gradient(135deg, #1e3264 0%, #13213c 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(30, 50, 100, 0.3);
        transition: all 0.2s;
      }
      .btn-submit-prod:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(30, 50, 100, 0.4);
      }

      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }

      @media (max-width: 600px) {
        .form-row {
          flex-direction: column;
          gap: 0;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div class="user-profile-container">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />
          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="form-container">
      <section class="form-card">
        <div style="margin-bottom: 20px">
          <a
            href="#"
            onclick="
              window.history.back();
              return false;
            "
            style="
              text-decoration: none;
              color: #1e3264;
              font-weight: 600;
              display: inline-flex;
              align-items: center;
              gap: 5px;
            "
          >
            ← Volver atrás
          </a>
        </div>
        <h2>Agregar Nuevo Producto Sostenible</h2>

        <form id="formProductoEncargado" onsubmit="procesarEnvioProducto(event)">
        
          <div class="form-group" id="contenedorProveedor">
            <label for="selectProveedorAsignado">Proveedor:</label>
            
            <select id="selectProveedorAsignado" class="form-select">
              <option value="">Seleccione un proveedor...</option>
            </select>
            
            <div id="textoProveedorAsignado" style="display: none; padding: 12px 16px; background-color: #e0f2fe; color: #0369a1; border-radius: 8px; font-weight: 600; font-size: 15px; border: 1px solid #bae6fd; margin-top: 4px;">
               Cargando proveedor...
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="nombreProducto">Nombre del Producto:</label>
              <input type="text" id="nombreProducto" required class="form-input" placeholder="Ej: Bolígrafos de Bambú Biodegradables" />
            </div>
            <div class="form-group">
              <label for="precioProducto">Precio Unitario (UYU):</label>
              <input type="number" id="precioProducto" required min="1" class="form-input" placeholder="Ej: 150" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="categoriaProducto">Categoría del Producto:</label>
              <select id="categoriaProducto" class="form-select" required>
                <option value="papel">Papel y Cartón</option>
                <option value="escritura">Elementos de Escritura</option>
                <option value="embalaje">Embalaje y Distribución</option>
              </select>
            </div>
            <div class="form-group">
              <label for="pctReciclado">% de Materiales Reciclados:</label>
              <input type="number" id="pctReciclado" required min="0" max="100" class="form-input" placeholder="Ej: 85" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="reciclable">¿Es Reciclable?:</label>
              <select id="reciclable" class="form-select">
                <option value="si">Sí</option>
                <option value="no">No</option>
              </select>
            </div>
            <div class="form-group">
              <label for="reutilizable">¿Es Reutilizable?:</label>
              <select id="reutilizable" class="form-select">
                <option value="no">No</option>
                <option value="si">Sí</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Certificaciones Específicas del Producto:</label>
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" name="certProd" value="FSC" /> FSC</label>
              <label class="checkbox-label"><input type="checkbox" name="certProd" value="ISO14001" /> ISO 14001</label>
              <label class="checkbox-label"><input type="checkbox" name="certProd" value="EMAS" /> EMAS</label>
              <label class="checkbox-label"><input type="checkbox" name="certProd" value="EcoLabel" /> EcoLabel</label>
            </div>
          </div>

          <div class="form-group">
            <label for="prodPdf">Certificados del Producto (PDF):</label>
            <input type="file" id="prodPdf" accept=".pdf" class="form-input">
          </div>

          <button type="submit" class="btn-submit-prod">
            Registrar Producto en el Catálogo
          </button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
      </div>
    </footer>

    <script src="../js/datosPlanos.js"></script>
    <script>
      // 1. MENU DROPDOWN Y AVATAR
      function toggleMenu() {
        const menu = document.getElementById("menuDropdown");
        menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
      }

      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("header nav img");
        if (menu && menu.style.display === "block" && event.target !== avatar && !menu.contains(event.target)) {
          menu.style.display = "none";
        }
      };

      // Variable global para guardar el nombre del proveedor implicado
      let nombreProveedorActivo = "Proveedor Seleccionado";

      // 2. LÓGICA HÍBRIDA (TEXTO FIJO VS DROPDOWN)
      document.addEventListener("DOMContentLoaded", () => {
        const selectProv = document.getElementById("selectProveedorAsignado");
        const textoProv = document.getElementById("textoProveedorAsignado");

        const params = new URLSearchParams(window.location.search);
        const urlProvId = params.get("proveedorId") || params.get("id");

        if (typeof PROVEEDORES !== 'undefined' && PROVEEDORES.length > 0) {
          
          if (urlProvId) {
            // ESCENARIO A: VENIMOS DESDE EL DETALLE -> MOSTRAMOS TEXTO FIJO
            const provEncontrado = PROVEEDORES.find(p => p.id === urlProvId);
            
            if (provEncontrado) {
              selectProv.style.display = "none"; 
              selectProv.removeAttribute("required"); 
              selectProv.value = provEncontrado.id; 
              nombreProveedorActivo = provEncontrado.nombre;
              
              textoProv.textContent = `El producto sera vinculado a: ${provEncontrado.nombre}`;
              textoProv.style.display = "block";
            } else {
              textoProv.innerHTML = ` Error: ID de proveedor no reconocido.`;
              textoProv.style.backgroundColor = "#fee2e2";
              textoProv.style.color = "#991b1b";
              textoProv.style.borderColor = "#fca5a5";
              textoProv.style.display = "block";
              selectProv.style.display = "none";
            }
            
          } else {
            // ESCENARIO B: VENIMOS DESDE LA LANDING -> MOSTRAMOS DROPDOWN COMÚN
            PROVEEDORES.forEach(p => {
              const opt = document.createElement("option");
              opt.value = p.id;
              opt.textContent = p.nombre;
              selectProv.appendChild(opt);
            });
            selectProv.setAttribute("required", "true");

            // Escuchar cambios para capturar el nombre comercial dinámicamente
            selectProv.addEventListener("change", function() {
              const seleccionado = PROVEEDORES.find(p => p.id === this.value);
              nombreProveedorActivo = seleccionado ? seleccionado.nombre : "Proveedor Seleccionado";
            });
          }
          
        } else {
          selectProv.innerHTML = `<option value="">Error crítico: datosPlanos.js no encontrado</option>`;
        }
      });

      // 3. PROCESAMIENTO SIMULADO CON ADJUNTOS Y MÚLTIPLES CERTS
      function procesarEnvioProducto(event) {
        event.preventDefault();

        const nombre = document.getElementById("nombreProducto").value;
        const precio = document.getElementById("precioProducto").value;
        const categoria = document.getElementById("categoriaProducto").value;
        const pct = document.getElementById("pctReciclado").value;
        const esReciclable = document.getElementById("reciclable").value.toUpperCase();
        const esReutilizable = document.getElementById("reutilizable").value.toUpperCase();

        // Capturar múltiples certificaciones marcadas
        const checkboxesCert = document.getElementsByName("certProd");
        let certificacionesSeleccionadas = [];
        checkboxesCert.forEach(cb => {
          if (cb.checked) {
            certificacionesSeleccionadas.push(cb.value);
          }
        });
        const certsTexto = certificacionesSeleccionadas.length > 0 ? certificacionesSeleccionadas.join(", ") : "Ninguna";

        // Capturar nombre del documento adjunto
        const pdfInput = document.getElementById("prodPdf");
        let nombreArchivoPdf = "Ninguno";
        if (pdfInput.files && pdfInput.files.length > 0) {
          nombreArchivoPdf = pdfInput.files[0].name;
        }

        let resumen = `¡Producto registrado y vinculado correctamente en el ecosistema UCU!\n\n` +
                      `El artículo ha sido asignado de forma directa a la cuenta de: ${nombreProveedorActivo}.\n\n` +
                      `• Insumo: ${nombre}\n` +
                      `• Precio: $${precio} UYU\n` +
                      `• Categoría: ${categoria}\n` +
                      `• Reciclable: ${esReciclable}\n` +
                      `• Reutilizable: ${esReutilizable}\n` +
                      `• Materia Prima Reciclada: ${pct}%\n` +
                      `• Aval Técnico (Certs): [${certsTexto}]\n` +
                      `• Documento de Soporte: ${nombreArchivoPdf}`;

        alert(resumen);
        document.getElementById("formProductoEncargado").reset();
        window.location.href = "lista-productos.html";
      }
    </script>
  </body>
</html>
