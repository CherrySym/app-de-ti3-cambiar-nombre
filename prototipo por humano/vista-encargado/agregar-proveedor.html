<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Añadir Proveedor - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css" />
    <style>
      /* Configuración base para el Layout Elástico e Institucional */
      * {
        box-sizing: border-box;
      }

      /* Estilos para el logo del header */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1); /* Hace que el logo se vea blanco*/
      }

      /* Estilos del Header */
      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between; /* Título a la izquierda, Menú a la derecha */
        align-items: center; /* Centra verticalmente los textos */
        color: white;
      }

      /* Estilos para que los enlaces y el avatar del nav estén en la misma línea */
      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      /* Estilos del menu de enlaces */
      header nav ul {
        list-style: none; /* Le quita los puntitos negros a la lista */
        margin: 0;
        padding: 0;
        display: flex; /* Hace que los <li> se pongan uno al lado del otro */
        gap: 20px; /* Separa los enlaces entre sí */
      }

      /* Estilos de los enlaces */
      header nav ul li a {
        text-decoration: none; /* Le quita el subrayado */
        color: #ffffff;
        font-weight: 500;
      }

      /* Cambio de color al pasar el mouse por los enlaces del nav */
      header nav ul li a:hover {
        color: #2f80ed;
      }

      /* Contenedor del avatar con posición relativa para el correcto anclaje del dropdown */
      .user-profile-container {
        position: relative;
        display: inline-block;
      }

      /* Estilos para el contenedor del menu flotante que aparece al hacer click en el icono de usuario */
      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px; /* Se posiciona justo abajo de la imagen */
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }

      /* Estilos para la sección interna con el nombre y mail del usuario */
      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }

      /* Texto en negrita para el nombre del usuario */
      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }

      /* Texto gris y más chico para el correo */
      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }

      /* Línea divisoria del menú desplegable */
      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }

      /* Estilos para el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }

      /* Cambio de color al pasar el mouse por el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }

      /* Contenedor principal que centra el formulario de forma estirada */
      .form-container {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      /* Tarjeta contenedora del Formulario (Estilo Postulación con Glassmorphism) */
      .form-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 24px;
        padding: 35px;
        width: 100%;
        max-width: 750px; /* Ancho cómodo y estirado para que las filas respiren */
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }

      /* Título principal */
      .form-card h2 {
        color: #13213c;
        font-size: 28px;
        margin-top: 10px;
        margin-bottom: 25px;
        font-weight: 700;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
      }

      /* Filas con dos columnas */
      .form-row {
        display: flex;
        gap: 20px;
        width: 100%;
      }

      /* Grupos de campos del formulario */
      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        flex: 1; /* Divide el espacio equitativamente */
      }

      .form-group label {
        font-weight: 600;
        color: #13213c;
        margin-bottom: 8px;
        font-size: 14px;
      }

      /* Estilos elásticos para inputs, selects y textareas */
      .form-input,
      .form-select,
      .form-textarea {
        padding: 12px 16px;
        border: 1px solid rgba(19, 33, 60, 0.2);
        border-radius: 8px;
        font-size: 15px;
        background-color: #ffffff;
        color: #333333;
        outline: none;
        font-family: Arial, sans-serif;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
      }

      /* Efecto de foco en los campos */
      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        border-color: #2f80ed;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }

      /* Configuración para Textareas */
      .form-textarea {
        resize: vertical;
        min-height: 80px;
      }

      /* Grupo de Checkbox */
      .checkbox-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
        flex-wrap: wrap;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500 !important;
        cursor: pointer;
        color: #4f5e7b;
      }

      .checkbox-label input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      /* Estiliza el botón interno de los inputs tipo file */
      .form-input::file-selector-button {
        background: rgba(47, 128, 237, 0.1);
        color: #2f80ed;
        border: none;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 600;
        margin-right: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .form-input::file-selector-button:hover {
        background: rgba(47, 128, 237, 0.2);
      }

      /* Botón de Enviar (Estilo Institucional Premium) */
      .btn-submit-prov {
        background: linear-gradient(135deg, #1e3264 0%, #13213c 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        box-shadow: 0 4px 15px rgba(30, 50, 100, 0.3);
        transition:
          transform 0.2s,
          background-color 0.2s,
          box-shadow 0.2s;
        margin-top: 10px;
      }

      .btn-submit-prov:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #243b75 0%, #1a2c52 100%);
        box-shadow: 0 6px 20px rgba(30, 50, 100, 0.4);
      }

      .btn-submit-prov:active {
        transform: translateY(0);
      }

      /* Footer */
      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }

      /* Responsivo para celulares: Las columnas dobles se apilan de forma fluida */
      @media (max-width: 600px) {
        .form-row {
          flex-direction: column;
          gap: 0;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div class="user-profile-container">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />
          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="form-container">
      <section class="form-card">
        <div style="margin-bottom: 20px">
          <a
            href="lista-proveedores.html"
            onclick="
              window.history.back();
              return false;
            "
            style="
              text-decoration: none;
              color: #1e3264;
              font-weight: 600;
              display: inline-flex;
              align-items: center;
              gap: 5px;
            "
          >
            ← Volver atrás
          </a>
        </div>
        <h2>Registrar Nuevo Proveedor</h2>

        <form
          action="lista-proveedores.html"
          onsubmit="alert('¡Proveedor registrado correctamente!')"
        >
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre de la Empresa:</label>
              <input
                type="text"
                id="nombre"
                required
                class="form-input"
                placeholder="Ej: EcoProveedores UY Ltda."
              />
            </div>
            <div class="form-group">
              <label for="contacto">Persona de Contacto:</label>
              <input
                type="text"
                id="contacto"
                required
                class="form-input"
                placeholder="Ej: Valentina Rocha"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Correo Electrónico:</label>
              <input
                type="email"
                id="email"
                required
                class="form-input"
                placeholder="contacto@empresa.com.uy"
              />
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono de Contacto:</label>
              <input
                type="tel"
                id="telefono"
                required
                class="form-input"
                placeholder="Ej: +598 2 410 8800"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cobertura">Cobertura de Logística:</label>
              <select id="cobertura" class="form-select">
                <option value="local">Local (Nacional)</option>
                <option value="importado">Importado (Internacional)</option>
                <option value="ambos">Ambos</option>
              </select>
            </div>
          </div> 
          <div class="form-row">
            <div class="form-group">
              <label for="embalaje_sostenible"
                >¿Utiliza Embalaje Sostenible?:</label
              >
              <select id="embalaje_sostenible" class="form-select">
                <option value="si">Sí</option>
                <option value="no">No</option>
                <option value="parcial">Parcial</option>
              </select>
            </div>
            <div class="form-group">
              <label for="energia_renovable"
                >¿Utiliza Energía Renovable?:</label
              >
              <select id="energia_renovable" class="form-select">
                <option value="si">Sí</option>
                <option value="no">No</option>
                <option value="parcial">Parcial</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Certificaciones de la Empresa:</label>
            <div class="checkbox-group">
              <label class="checkbox-label"
                ><input
                  type="checkbox"
                  name="certificaciones"
                  value="ISO14001"
                />
                ISO 14001</label
              >
              <label class="checkbox-label"
                ><input type="checkbox" name="certificaciones" value="FSC" />
                FSC</label
              >
              <label class="checkbox-label"
                ><input type="checkbox" name="certificaciones" value="EMAS" />
                EMAS</label
              >
            </div>
          </div>

          <div class="form-group">
            <label for="pdf_certificados">Adjuntar Certificaciónes (Formato PDF):</label>
            <input
              type="file"
              id="pdf_certificados"
              accept=".pdf"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label for="descripcion">Descripción Comercial:</label>
            <textarea
              id="descripcion"
              class="form-textarea"
              placeholder="Breve reseña sobre la empresa y sus materiales..."
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="desafios">Desafíos de Sostenibilidad:</label>
              <textarea
                id="desafios"
                class="form-textarea"
                placeholder="¿Qué dificultades enfrenta la empresa actualmente?"
              ></textarea>
            </div>
            <div class="form-group">
              <label for="metas">Metas a Futuro:</label>
              <textarea
                id="metas"
                class="form-textarea"
                placeholder="Ej: Reducir packaging plástico al 50% para 2027"
              ></textarea>
            </div>
          </div>

          <button type="submit" class="btn-submit-prov">
            Guardar Proveedor
          </button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
      </div>
    </footer>

    <script>
      // Función para mostrar/ocultar el menú desplegable al hacer clic en la imagen de perfil
      function toggleMenu() {
        const menu = document.getElementById("menuDropdown");
        if (menu.style.display === "none" || menu.style.display === "") {
          menu.style.display = "block";
        } else {
          menu.style.display = "none";
        }
      }

      // Función para ocultar el menú desplegable si se hace clic fuera de él
      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector(".user-profile-container img");

        if (
          menu &&
          menu.style.display === "block" &&
          event.target !== avatar &&
          !menu.contains(event.target)
        ) {
          menu.style.display = "none";
        }
      };
    </script>
  </body>
</html>
