<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Añadir Proveedor - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      /* Configuración base para el Layout Elástico e Institucional */
      * {
        box-sizing: border-box;
      }

      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }

      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }

      header nav ul li a:hover {
        color: #2f80ed;
      }

      .user-profile-container {
        position: relative;
        display: inline-block;
      }

      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px;
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }

      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }

      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }

      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }

      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }

      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }

      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }

      .form-container {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .form-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 24px;
        padding: 35px;
        width: 100%;
        max-width: 750px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }

      .form-card h2 {
        color: #13213c;
        font-size: 28px;
        margin-top: 10px;
        margin-bottom: 25px;
        font-weight: 700;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
      }

      .form-row {
        display: flex;
        gap: 20px;
        width: 100%;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        flex: 1;
      }

      .form-group label {
        font-weight: 600;
        color: #13213c;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .form-input,
      .form-select,
      .form-textarea {
        padding: 12px 16px;
        border: 1px solid rgba(19, 33, 60, 0.2);
        border-radius: 8px;
        font-size: 15px;
        background-color: #ffffff;
        color: #333333;
        outline: none;
        font-family: Arial, sans-serif;
        transition: border-color 0.2s, box-shadow 0.2s;
        width: 100%;
      }

      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        border-color: #2f80ed;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }

      .form-textarea {
        resize: vertical;
        min-height: 80px;
      }

      .checkbox-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
        flex-wrap: wrap;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500 !important;
        cursor: pointer;
        color: #4f5e7b;
      }

      .checkbox-label input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .form-input::file-selector-button {
        background: rgba(47, 128, 237, 0.1);
        color: #2f80ed;
        border: none;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 600;
        margin-right: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .form-input::file-selector-button:hover {
        background: rgba(47, 128, 237, 0.2);
      }

      /* ESTILOS NUEVOS: Lista de archivos PDF seleccionados */
      .lista-archivos {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .archivo-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #f0f4f8;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 14px;
        color: #333;
        border: 1px solid #d9e2ec;
      }

      .btn-quitar-archivo {
        background: none;
        border: none;
        color: #dc3545;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        padding: 0 5px;
        line-height: 1;
      }
      .btn-quitar-archivo:hover {
        color: #a71d2a;
      }

      .btn-submit-prov {
        background: linear-gradient(135deg, #1e3264 0%, #13213c 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        box-shadow: 0 4px 15px rgba(30, 50, 100, 0.3);
        transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        margin-top: 10px;
      }

      .btn-submit-prov:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #243b75 0%, #1a2c52 100%);
        box-shadow: 0 6px 20px rgba(30, 50, 100, 0.4);
      }

      .btn-submit-prov:active {
        transform: translateY(0);
      }

      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }

      @media (max-width: 600px) {
        .form-row {
          flex-direction: column;
          gap: 0;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div class="user-profile-container">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />
          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="form-container">
      <section class="form-card">
        <div style="margin-bottom: 20px">
          <a
            href="lista-proveedores.html"
            onclick="window.history.back(); return false;"
            style="
              text-decoration: none;
              color: #1e3264;
              font-weight: 600;
              display: inline-flex;
              align-items: center;
              gap: 5px;
            "
          >
            &larr; Volver atrás
          </a>
        </div>
        <h2>Registrar Nuevo Proveedor</h2>

        <form id="formProveedorEncargado" onsubmit="procesarEnvioProveedor(event)">
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre de la Empresa:</label>
              <input
                type="text"
                id="nombre"
                required
                class="form-input"
                placeholder="Ej: EcoProveedores UY Ltda."
                maxlength="80"
              />
            </div>
            <div class="form-group">
              <label for="contacto_persona">Persona de Contacto:</label>
              <input
                type="text"
                id="contacto_persona"
                required
                class="form-input"
                placeholder="Ej: Valentina Rocha"
                maxlength="70"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Correo Electrónico:</label>
              <input
                type="email"
                id="email"
                required
                class="form-input"
                placeholder="contacto@empresa.com.uy"
                maxlength="100"
              />
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono de Contacto:</label>
              <input
                type="tel"
                id="telefono"
                required
                class="form-input"
                placeholder="Ej: +598 2 410 8800"
                maxlength="25"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="procedencia">Procedencia del Proveedor:</label>
              <select id="procedencia" class="form-select">
                <option value="nacional">Nacional (Local)</option>
                <option value="internacional">Internacional (Importado)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="embalaje_sostenible">¿Utiliza Embalaje Sostenible?:</label>
              <select id="embalaje_sostenible" class="form-select">
                <option value="si">Sí</option>
                <option value="no">No</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Certificaciones de la Empresa:</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" name="certificaciones" value="ISO14001" /> ISO 14001
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="certificaciones" value="EMAS" /> EMAS
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="pdf_certificados">Adjuntar Certificaciones (Formato PDF):</label>
            <input
              type="file"
              id="pdf_certificados"
              accept=".pdf"
              multiple
              class="form-input"
              onchange="manejarSeleccionArchivos(this)"
            />
            <div id="listaArchivosContenedor" class="lista-archivos"></div>
          </div>

          <div class="form-group">
            <label for="descripcion">Descripción Comercial:</label>
            <textarea
              id="descripcion"
              class="form-textarea"
              placeholder="Breve reseña sobre la empresa y sus materiales..."
              maxlength="500"
            ></textarea>
          </div>

          <button type="submit" id="btnSubmitProv" class="btn-submit-prov">
            Guardar Proveedor
          </button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
      </div>
    </footer>

    <script type="module">
      import { supabaseClient } from '../js/conexion-bd.js';

      // Arreglo global intermedio para guardar la lista real de archivos limpios y validados
      let listaArchivosGlobal = [];

      window.toggleMenu = function() {
        const menu = document.getElementById("menuDropdown");
        menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
      };

      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector(".user-profile-container img");
        if (menu && menu.style.display === "block" && event.target !== avatar && !menu.contains(event.target)) {
          menu.style.display = "none";
        }
      };

      // NUEVA FUNCIÓN: Filtra en tiempo real extensiones inválidas y gestiona múltiples archivos
      window.manejarSeleccionArchivos = function(input) {
        const contenedor = document.getElementById("listaArchivosContenedor");
        const archivosSeleccionados = Array.from(input.files);

        archivosSeleccionados.forEach(archivo => {
          const nombreArchivo = archivo.name.toLowerCase();
          
          // CONTROL DE INSTANTE: Si no termina en .pdf, se rechaza y limpia al momento
          if (!nombreArchivo.endsWith('.pdf')) {
            alert(`El archivo "${archivo.name}" fue rechazado. Solo se permiten documentos PDF.`);
            return; 
          }

          // Evitar duplicados en la lista visual/global
          if (!listaArchivosGlobal.some(f => f.name === archivo.name && f.size === archivo.size)) {
            listaArchivosGlobal.push(archivo);
          }
        });

        // Limpiamos el input nativo para que el usuario pueda volver a dar click y elegir el mismo si quiere
        input.value = "";
        
        actualizarListaVisual();
      };

      // NUEVA FUNCIÓN: Renderiza los ítems en pantalla con la cruz roja para eliminar
      function actualizarListaVisual() {
        const contenedor = document.getElementById("listaArchivosContenedor");
        contenedor.innerHTML = "";

        listaArchivosGlobal.forEach((archivo, index) => {
          const item = document.createElement("div");
          item.className = "archivo-item";
          item.innerHTML = `
            <span>📄 ${archivo.name}</span>
            <button type="button" class="btn-quitar-archivo" onclick="removerArchivoDelArreglo(${index})">&times;</button>
          `;
          contenedor.appendChild(item);
        });
      }

      // NUEVA FUNCIÓN: Permite sacar un archivo usando la cruz roja
      window.removerArchivoDelArreglo = function(index) {
        listaArchivosGlobal.splice(index, 1);
        actualizarListaVisual();
      };

      window.procesarEnvioProveedor = async function(event) {
        event.preventDefault();

        const btnSubmit = document.getElementById("btnSubmitProv");
        btnSubmit.disabled = true;
        btnSubmit.textContent = "Guardando proveedor...";

        const nombre = document.getElementById("nombre").value.trim();
        const contactoPersona = document.getElementById("contacto_persona").value.trim();
        const email = document.getElementById("email").value.trim();
        const telefono = document.getElementById("telefono").value.trim();
        const procedencia = document.getElementById("procedencia").value;
        const descripcion = document.getElementById("descripcion").value.trim();

        const embalajeSostenibleValor = document.getElementById("embalaje_sostenible").value === "si";

        const checkboxes = document.querySelectorAll('input[name="certificaciones"]:checked');
        const valoresCheckboxes = Array.from(checkboxes).map(cb => cb.value);
        
        const tieneISO = valoresCheckboxes.includes("ISO14001");
        const tieneEMAS = valoresCheckboxes.includes("EMAS");

        // Nota de arquitectura: Aquí ya tienes 'listaArchivosGlobal' lista con puros PDFs reales en binario por si luego necesitas subirlos a un Storage bucket de Supabase.

        try {
          const { error } = await supabaseClient
            .from('proveedores_ucu')
            .insert([
              {
                tipo: 'proveedor',
                estado: 'aprobada', 
                nombre: nombre,
                contacto_persona: contactoPersona,
                email: email,
                telefono: telefono,
                descripcion: descripcion,
                procedencia: procedencia,
                embalaje_sostenible: embalajeSostenibleValor,
                tiene_iso14001: tieneISO,
                tiene_fsc: false, // Residuo completamente mitigado. Listo para tu cambio de BD estructurado.
                tiene_emas: tieneEMAS
              }
            ]);

          if (error) throw error;

          alert(`¡El proveedor "${nombre}" se ha registrado con éxito y ya se encuentra activo en el sistema!`);
          document.getElementById("formProveedorEncargado").reset();
          listaArchivosGlobal = [];
          actualizarListaVisual();
          
          window.location.href = "landing.html";

        } catch (err) {
          console.error("Error al insertar proveedor:", err);
          alert(`Error al guardar en Supabase: ${err.message}`);
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.textContent = "Guardar Proveedor";
        }
      };
    </script>
  </body>
</html>
