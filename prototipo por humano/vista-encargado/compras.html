<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Compras - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: url("../assets/fondo-ucu.jpeg") no-repeat center top fixed;
        background-size: cover;
        background-color: #e4dccf; /* Color base estable */
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }

      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }

      header nav ul li a:hover {
        color: #2f80ed;
      }

      .user-profile-container {
        position: relative;
        display: inline-block;
      }

      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px;
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }

      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
        text-align: left;
      }

      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }

      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }

      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }

      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }

      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }

      /* Layout de Dos Columnas (Tabla + Carrito) */
      .shop-container {
        flex: 1;
        max-width: 1300px;
        width: 100%;
        margin: 40px auto;
        padding: 0 20px;
        display: flex;
        gap: 25px;
        align-items: flex-start;
      }

      @media (max-width: 1000px) {
        .shop-container {
          flex-direction: column;
        }
      }

      .left-panel {
        flex: 3;
        width: 100%;
      }

      .right-panel {
        flex: 1;
        width: 100%;
        position: sticky;
        top: 20px;
      }

      .btn-back-container {
        margin-bottom: 20px;
        text-align: left;
      }

      .btn-back {
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 10px 20px;
        border-radius: 8px;
        background-color: #1e3264;
        color: #ffffff;
        border: 2px solid #1e3264;
        transition: all 0.2s ease-in-out;
        font-size: 14px;
      }

      .btn-back:hover {
        background-color: #ffffff;
        color: #1e3264;
        border-color: #1e3264;
      }

      .page-title {
        color: #1e3264;
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 26px;
        font-weight: 700;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 12px;
      }

      .filter-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        align-items: flex-end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .filter-group label {
        font-size: 11px;
        font-weight: 700;
        color: #13213c;
        text-transform: uppercase;
      }

      .filter-input,
      .filter-select {
        padding: 10px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 14px;
        background-color: white;
        color: #334155;
      }

      .filter-input:disabled {
        background-color: #f1f5f9;
        color: #64748b;
        cursor: not-allowed;
      }

      .checkbox-filter-group {
        display: flex;
        gap: 15px;
        padding-bottom: 10px;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #13213c;
        cursor: pointer;
      }

      /* Tabla de Catálogo */
      .table-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 1px solid rgba(19, 33, 60, 0.1);
      }

      .table-container {
        overflow-x: auto;
      }

      .catalog-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        text-align: left;
      }

      .catalog-table th {
        background-color: #1e3264;
        color: white;
        padding: 14px;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }

      .catalog-table td {
        padding: 14px;
        border-bottom: 1px solid #e2e8f0;
        color: #334155;
      }

      /* Controles de cantidad interactivos */
      .btn-qty-control {
        background-color: #f1f5f9;
        color: #1e3264;
        border: 1px solid #cbd5e1;
        font-weight: bold;
        font-size: 15px;
        width: 30px;
        height: 30px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.1s;
      }
      .btn-qty-control:hover {
        background-color: #cbd5e1;
      }

      .input-qty {
        width: 45px;
        height: 30px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        text-align: center;
        font-size: 14px;
        font-weight: bold;
        outline: none;
        background-color: #ffffff;
        color: #333333;
      }

      /* Panel Lateral del Carrito */
      .cart-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(19, 33, 60, 0.1);
      }

      .cart-card h3 {
        margin-top: 0;
        color: #13213c;
        border-bottom: 2px solid #1e3264;
        padding-bottom: 10px;
        font-size: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 15px 0;
        max-height: 350px;
        overflow-y: auto;
        padding-right: 5px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        background: #f8fafc;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
      }

      .cart-item-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        text-align: left;
      }

      .cart-item-name {
        font-weight: 600;
        color: #1a202c;
      }

      .cart-item-meta {
        font-size: 11px;
        color: #64748b;
      }

      .btn-remove-item {
        background: none;
        border: none;
        color: #dc3545;
        font-size: 18px;
        cursor: pointer;
        padding: 0 5px;
        line-height: 1;
      }

      .cart-empty-msg {
        color: #64748b;
        font-size: 13px;
        text-align: center;
        padding: 20px 0;
        font-style: italic;
      }

      .cart-total-zone {
        border-top: 2px dashed #e2e8f0;
        padding-top: 15px;
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        color: #13213c;
        font-size: 16px;
      }

      .btn-confirm-order {
        width: 100%;
        background-color: #2e7d32;
        color: white;
        border: none;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 15px;
        box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
        transition: background-color 0.2s;
      }

      .btn-confirm-order:hover {
        background-color: #1b5e20;
      }

      .btn-confirm-order:disabled {
        background-color: #cbd5e1;
        color: #94a3b8;
        cursor: not-allowed;
        box-shadow: none;
      }

      .badge-prov {
        color: #1e3264;
        font-weight: 600;
      }

      /* Estilos base para el badge del puntaje */
      .badge-score {
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: bold;
        margin-left: 6px;
        display: inline-block;
      }

      /* ESTILOS SÉMAFORO PARA PUNTAJES */
      .score-high {
        background-color: #dcfce7;
        color: #15803d;
        border: 1px solid #bbf7d0;
      }
      .score-medium {
        background-color: #fef3c7;
        color: #b45309;
        border: 1px solid #fde68a;
      }
      .score-low {
        background-color: #fee2e2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      .badge-cat {
        background-color: #f1f5f9;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        text-transform: capitalize;
      }
      .badge-y {
        background-color: #dcfce7;
        color: #166534;
        padding: 2px 5px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-n {
        background-color: #fee2e2;
        color: #991b1b;
        padding: 2px 5px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-c {
        background-color: #e0f2fe;
        color: #0369a1;
        border: 1px solid #bae6fd;
        padding: 3px 6px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 3px;
        display: inline-block;
        text-decoration: none;
      }
      .badge-c.fsc-link:hover {
        background-color: #bae6fd;
        color: #025a87;
        transform: translateY(-1px);
      }

      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }
    </style>
  </head>

  <body>
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div class="user-profile-container">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />
          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong id="perfilUsuario">Encargado de Compras</strong>
              <span id="perfilEmail">compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a
              href="../login.html"
              onclick="sessionStorage.clear()"
              class="logout-link"
              >Cerrar Sesión</a
            >
          </div>
        </div>
      </nav>
    </header>

    <main class="shop-container">
      <div class="left-panel">
        <div class="btn-back-container">
          <!-- PREVENCIÓN DE BUCLE: Enlace directo al panel del encargado -->
          <a href="landing.html" class="btn-back">← Volver al Panel</a>
        </div>

        <section class="filter-section">
          <!-- TÍTULO INTEGRADO DENTRO DE LA TARJETA PARA EXCELENTE CONTRASTE -->
          <h2 class="page-title" id="dinamic-title">
            Comprar Productos Sostenibles
          </h2>

          <div class="filter-grid">
            <div class="filter-group">
              <label for="searchProveedor">Filtrar por Proveedor:</label>
              <input
                type="text"
                id="searchProveedor"
                class="filter-input"
                placeholder="Ej: EcoProveedores..."
              />
            </div>

            <div class="filter-group">
              <label for="selectCategoria">Categoría:</label>
              <select id="selectCategoria" class="filter-select">
                <option value="todos">Todas las categorías</option>
                <option value="papel">Papel</option>
                <option value="escritura">Escritura</option>
                <option value="embalaje">Embalaje</option>
                <option value="archivo">Archivo / Organización</option>
              </select>
            </div>

            <div
              class="filter-group"
              style="flex-direction: row; gap: 20px; padding-bottom: 8px"
            >
              <label class="checkbox-label">
                <input type="checkbox" id="checkReciclable" /> Reciclable
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="checkReutilizable" /> Reutilizable
              </label>
            </div>
          </div>
        </section>

        <div class="table-card">
          <div class="table-container">
            <table class="catalog-table">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Proveedor</th>
                  <th>Precio</th>
                  <th>Categoría</th>
                  <th>Recic.</th>
                  <th>Reutil.</th>
                  <th>% Mat.</th>
                  <th>Certificaciones del Producto</th>
                  <th style="text-align: center; width: 140px">Cantidad</th>
                </tr>
              </thead>
              <tbody id="tbody-catalogo">
                <tr>
                  <td colspan="9" style="text-align: center; color: #1e3264">
                    Cargando catálogo en tiempo real...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <aside class="right-panel">
        <div class="cart-card">
          <h3>
            <span>Carrito</span>
            <span
              id="cart-count"
              style="
                font-size: 13px;
                background: #1e3264;
                color: white;
                padding: 2px 8px;
                border-radius: 10px;
              "
              >0</span
            >
          </h3>

          <div id="cart-list" class="cart-list"></div>

          <div class="cart-total-zone">
            <span>Total Estimado:</span>
            <span id="cart-total">$0</span>
          </div>

          <button id="btn-confirm" class="btn-confirm-order" disabled>
            Confirmar Orden de Compra
          </button>
        </div>
      </aside>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
      </div>
    </footer>

    <script type="module">
      import { supabaseClient } from "../js/conexion-bd.js";

      // Variables de estado
      let carrito = [];
      let productosGlobales = [];

      // --- MENÚ DESPLEGABLE ---
      window.toggleMenu = function () {
        const menu = document.getElementById("menuDropdown");
        menu.style.display =
          menu.style.display === "none" || menu.style.display === ""
            ? "block"
            : "none";
      };

      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("header nav img");
        if (
          menu &&
          menu.style.display === "block" &&
          event.target !== avatar &&
          !menu.contains(event.target)
        ) {
          menu.style.display = "none";
        }
      };

      // --- CARGA DE DATOS ---
      document.addEventListener("DOMContentLoaded", async () => {
        // Cargar información del usuario del sessionStorage
        const usuarioLogueado = sessionStorage.getItem("usuarioUCU");
        if (usuarioLogueado) {
          const partes = usuarioLogueado.split(".");
          const nombreCompleto = partes
            .map((p) => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase())
            .join(" ");
          const profileName = document.getElementById("perfilUsuario");
          const profileEmail = document.getElementById("perfilEmail");
          if (profileName) profileName.innerText = nombreCompleto;
          if (profileEmail)
            profileEmail.innerText = `${usuarioLogueado.toLowerCase()}@correo.ucu.edu.uy`;
        }

        document
          .getElementById("searchProveedor")
          .addEventListener("keyup", filtrarTabla);
        document
          .getElementById("selectCategoria")
          .addEventListener("change", filtrarTabla);
        document
          .getElementById("checkReciclable")
          .addEventListener("change", filtrarTabla);
        document
          .getElementById("checkReutilizable")
          .addEventListener("change", filtrarTabla);
        document
          .getElementById("btn-confirm")
          .addEventListener("click", confirmarPedido);

        const urlParams = new URLSearchParams(window.location.search);
        const proveedorId = urlParams.get("id");

        try {
          // CORRECCIÓN: FSC y url_certificado pertenecen a la tabla productos.
          // 'proveedores_ucu' solo provee nombre y su puntuación de sostenibilidad.
          // Además, solo cargamos los productos que estén aprobados para la venta.
          let query = supabaseClient
            .from("productos_ucu")
            .select(
              `
 id,
 nombre,
 precio,
 categoria,
 es_reciclable,
 es_reusable,
 mat_reciclados_pct,
 tiene_fsc,
 url_certificado,
 proveedor_id,
 proveedores_ucu (
 nombre,
 puntaje_total
 )
 `,
            )
            .eq("estado", "aprobado");

          if (proveedorId) {
            query = query.eq("proveedor_id", proveedorId);
          }

          const { data, error } = await query;
          if (error) throw error;

          productosGlobales = data || [];

          if (proveedorId && productosGlobales.length > 0) {
            const inputProv = document.getElementById("searchProveedor");
            const nombreProvFiltrado =
              productosGlobales[0].proveedores_ucu?.nombre ||
              "Proveedor Seleccionado";

            inputProv.value = nombreProvFiltrado;
            inputProv.disabled = true;
            document.getElementById("dinamic-title").innerText =
              `Catálogo: ${nombreProvFiltrado}`;
          }

          renderizarCatalogo(productosGlobales);
        } catch (err) {
          console.error("Error al descargar catálogo:", err);
          document.getElementById("tbody-catalogo").innerHTML =
            `<tr><td colspan="9" style="text-align:center; color: red; font-weight: bold;">Error al conectar con Supabase: ${err.message}</td></tr>`;
        }
      });

      function renderizarCatalogo(listaProductos) {
        const tbody = document.getElementById("tbody-catalogo");
        tbody.innerHTML = "";

        if (listaProductos.length === 0) {
          tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color: #64748b;">No se encontraron productos con los filtros seleccionados.</td></tr>`;
          return;
        }

        listaProductos.forEach((prod, idx) => {
          // Ajuste: Visualización de SI y NO estrictamente en mayúsculas (SI y NO)
          const recBadge = prod.es_reciclable
            ? '<span class="badge-y">SI</span>'
            : '<span class="badge-n">NO</span>';
          const reuBadge = prod.es_reusable
            ? '<span class="badge-y">SI</span>'
            : '<span class="badge-n">NO</span>';

          let certsHtml = "";
          const p = prod.proveedores_ucu;

          // CORRECCIÓN: Filtrado para mostrar ÚNICAMENTE certificaciones de producto (FSC) y no las de la empresa (ISO/EMAS)
          if (prod.tiene_fsc) {
            const linkCertificado =
              prod.url_certificado || "https://pdfobject.com/pdf/sample.pdf";
            certsHtml += `<a href="${linkCertificado}" target="_blank" class="badge-c fsc-link" style="text-decoration: underline; cursor: pointer;">FSC (Ver PDF)</a>`;
          }

          if (!certsHtml) certsHtml = "-";

          // FORMATO SEMÁFORO PARA EL PUNTAJE DE SOSTENIBILIDAD
          let scoreHtml = "";
          if (p && p.puntaje_total !== null) {
            const score = parseFloat(p.puntaje_total);
            let scoreClass = "score-low";

            if (score >= 75) {
              scoreClass = "score-high"; // Verde
            } else if (score >= 45) {
              scoreClass = "score-medium"; // Amarillo/Naranja
            }
            scoreHtml = `<span class="badge-score ${scoreClass}">${score} pts</span>`;
          }

          const nombreProveedor = p
            ? `${p.nombre} ${scoreHtml}`
            : "Sin asignar";

          // Sincronización: Verificar si el producto ya está en el carrito para mantener su cantidad al redibujar
          const itemEnCarrito = carrito.find(
            (item) => item.nombre === prod.nombre,
          );
          const cantidadInicial = itemEnCarrito ? itemEnCarrito.cantidad : 0;

          const fila = document.createElement("tr");
          fila.innerHTML = `
 <td><strong>${prod.nombre}</strong></td>
 <td class="badge-prov">${nombreProveedor}</td>
 <td><strong>$${prod.precio}</strong></td>
 <td><span class="badge-cat">${prod.categoria || "-"}</span></td>
 <td>${recBadge}</td>
 <td>${reuBadge}</td>
 <td>${prod.mat_reciclados_pct || 0}%</td>
 <td>${certsHtml}</td>
 <td style="text-align: center; display: flex; gap: 6px; justify-content: center; align-items: center;">
 <button id="btn-dec-${idx}" class="btn-qty-control">－</button>
 <input type="number" id="qty-${idx}" class="input-qty" value="${cantidadInicial}" min="0" readonly>
 <button id="btn-inc-${idx}" class="btn-qty-control">＋</button>
 </td>
 `;
          tbody.appendChild(fila);

          // Lógica interactiva: Los botones de incremento y decremento modifican el carrito en tiempo real
          document
            .getElementById(`btn-dec-${idx}`)
            .addEventListener("click", () => {
              const input = document.getElementById(`qty-${idx}`);
              let currentVal = parseInt(input.value, 10) || 0;
              if (currentVal > 0) {
                const nuevoVal = currentVal - 1;
                input.value = nuevoVal;
                actualizarCarritoDirecto(prod.nombre, prod.precio, nuevoVal);
              }
            });

          document
            .getElementById(`btn-inc-${idx}`)
            .addEventListener("click", () => {
              const input = document.getElementById(`qty-${idx}`);
              let currentVal = parseInt(input.value, 10) || 0;
              const nuevoVal = currentVal + 1;
              input.value = nuevoVal;
              actualizarCarritoDirecto(prod.nombre, prod.precio, nuevoVal);
            });
        });
      }

      function filtrarTabla() {
        const queryProveedor = document
          .getElementById("searchProveedor")
          .value.toLowerCase();
        const categoriaSel = document.getElementById("selectCategoria").value;
        const filtrarReciclable =
          document.getElementById("checkReciclable").checked;
        const filtrarReutilizable =
          document.getElementById("checkReutilizable").checked;

        const productosFiltrados = productosGlobales.filter((prod) => {
          const p = prod.proveedores_ucu;
          const inputProv = document.getElementById("searchProveedor");
          const matchProveedor = inputProv.disabled
            ? true
            : p
              ? p.nombre.toLowerCase().includes(queryProveedor)
              : false;

          const matchCategoria =
            categoriaSel === "todos" || prod.categoria === categoriaSel;
          const matchReciclable = !filtrarReciclable || prod.es_reciclable;
          const matchReutilizable = !filtrarReutilizable || prod.es_reusable;

          return (
            matchProveedor &&
            matchCategoria &&
            matchReciclable &&
            matchReutilizable
          );
        });

        renderizarCatalogo(productosFiltrados);
      }

      // Modificación o adición directa al carrito en base a la cantidad exacta seleccionada
      function actualizarCarritoDirecto(nombre, precio, cantidad) {
        const index = carrito.findIndex((item) => item.nombre === nombre);
        if (cantidad === 0) {
          if (index !== -1) {
            carrito.splice(index, 1);
          }
        } else {
          if (index !== -1) {
            carrito[index].cantidad = cantidad;
          } else {
            carrito.push({ nombre, precio, cantidad });
          }
        }
        renderCarrito();
      }

      function renderCarrito() {
        const cartListDiv = document.getElementById("cart-list");
        const totalSpan = document.getElementById("cart-total");
        const countSpan = document.getElementById("cart-count");
        const btnConfirm = document.getElementById("btn-confirm");

        cartListDiv.innerHTML = "";

        if (carrito.length === 0) {
          cartListDiv.innerHTML = `<div class="cart-empty-msg">No hay productos seleccionados</div>`;
          totalSpan.innerText = "$0";
          countSpan.innerText = "0";
          btnConfirm.disabled = true;

          // Sincronización inversa: Si el carrito se vacía, todos los inputs se limpian a 0
          productosGlobales.forEach((prod, idx) => {
            const input = document.getElementById(`qty-${idx}`);
            if (input) input.value = 0;
          });
          return;
        }

        btnConfirm.disabled = false;
        let totalAcumulado = 0;
        let totalItems = 0;

        carrito.forEach((item, index) => {
          const subtotal = item.precio * item.cantidad;
          totalAcumulado += subtotal;
          totalItems += item.cantidad;

          const itemDiv = document.createElement("div");
          itemDiv.className = "cart-item";
          itemDiv.innerHTML = `
 <div class="cart-item-info">
 <span class="cart-item-name">${item.nombre}</span>
 <span class="cart-item-meta">${item.cantidad} x $${item.precio} — Subtotal: $${subtotal}</span>
 </div>
 <button id="btn-rem-${index}" class="btn-remove-item">×</button>
 `;
          cartListDiv.appendChild(itemDiv);

          document
            .getElementById(`btn-rem-${index}`)
            .addEventListener("click", () => {
              // Al presionar la X, se notifica cantidad 0 para limpiar el carrito y reiniciar el input de la tabla
              actualizarCarritoDirecto(item.nombre, item.precio, 0);
            });
        });

        totalSpan.innerText = "$" + totalAcumulado;
        countSpan.innerText = totalItems;

        // Sincronización inversa activa: Sincronizar los inputs visibles en la tabla con las cantidades actuales
        productosGlobales.forEach((prod, idx) => {
          const input = document.getElementById(`qty-${idx}`);
          if (input) {
            const item = carrito.find((c) => c.nombre === prod.nombre);
            input.value = item ? item.cantidad : 0;
          }
        });
      }

      function confirmarPedido() {
        let resumenText = "ORDEN DE COMPRA GENERADA CON ÉXITO\n\n";
        let totalAcumulado = 0;

        carrito.forEach((item) => {
          const subtotal = item.precio * item.cantidad;
          totalAcumulado += subtotal;
          resumenText += `• ${item.nombre} x${item.cantidad} -> $${subtotal}\n`;
        });

        resumenText += `\nTOTAL DE FACTURACIÓN: $${totalAcumulado}\n\nLos datos han sido validados directamente contra la nube de Supabase.`;

        alert(resumenText);
        carrito = [];
        renderCarrito();
      }
    </script>
  </body>
</html>
