<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del Proveedor - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      /* Estilos del Logo */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1); /* Hace que el logo se vea blanco */
      }
      /* Estilos del Header */
      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between; /* Título a la izquierda, Menú a la derecha */
        align-items: center; /* Centra verticalmente los textos */
        color: white;
      }
      /* Estilos para que los enlaces y el avatar del nav estén en la misma línea */
      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }
      /* Estilos del menu de enlaces */
      header nav ul {
        list-style: none; /* Le quita los puntos a la lista */
        margin: 0;
        padding: 0;
        display: flex; /* Hace que los <li> se pongan uno al lado del otro */
        gap: 20px; /* Separa los enlaces entre sí */
      }
      /* Estilos de los enlaces */
      header nav ul li a {
        text-decoration: none; /* Le quita el subrayado */
        color: #ffffff;
        font-weight: 500;
      }
      /* Cambio de color al pasar el mouse por los enlaces del nav */
      header nav ul li a:hover {
        color: #2f80ed;
      }
      /* Estilos para el contenedor del menu flotante que aparece al hacer click en el icono de usuario */
      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px; /* Se posiciona justo abajo de la imagen */
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }
      /* Estilos para la sección interna con el nombre y mail del usuario */
      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }
      /* Texto en negrita para el nombre del usuario */
      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }
      /* Texto gris y más chico para el correo */
      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }
      /* Línea divisoria del menú desplegable */
      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }
      /* Estilos para el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }
      /* Cambio de color al pasar el mouse por el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }
      /* Estilos del contenedor de detalles */
      .detail-container {
        flex: 1;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        width: 100%;
      }

      /* Estilos del botón para volver atrás */
      .btn-back {
        display: inline-flex;
        align-items: center;
        margin-bottom: 20px;
        color: #1e3264;
        text-decoration: none;
        font-weight: 600;
        gap: 5px;
      }
      /* Cambio de color al pasar el mouse por el boton de "Volver Atrás" */
      .btn-back:hover {
        color: #2f80ed;
      }

      /* Estilos de la tarjeta de detalles*/
      .detail-card {
        background-color: #ffffff;
        padding: 40px;
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      }
      /* Estilos del encabezado de la tarjeta */
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 20px;
        margin-bottom: 25px;
      }
      /* Estilos para el nombre del proveedor */
      .detail-header h2 {
        font-size: 28px;
        color: #13213c;
        margin: 0 0 8px 0;
        font-weight: 700;
      }
      /* Estilos del botón "Editar información" */ 
      .btn-editar-simulado {
        padding: 8px 14px;
        border: 1px solid #cccccc;
        border-radius: 6px;
        background-color: #f5f5f5;
        color: #333333;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
      }

      /* Cambio de color al pasar el mouse por el boton de "Editar información" */
      .btn-editar-simulado:hover {
        background-color: #e2e2e2;
      }
      /* Estilos de las insignias de puntaje */
      .badge-score {
        color: white;
        padding: 6px 14px;
        border-radius: 6px;
        font-weight: 700;
        font-size: 15px;
        white-space: nowrap;
        display: inline-block;
      }
      /* El color de fondo de las insignias dependiendo el puntaje*/
      .bg-verde { background-color: #219653; }
      .bg-amarillo { background-color: #f2c94c; color: #333333; }
      .bg-rojo { background-color: #eb5757; }

      /* Estilos para separar los bloques de secciones */ 
      .info-section {
        margin-bottom: 30px;
      }
      /* Estilos de los títulos de las secciones  */
      .info-section h3 {
        font-size: 14px;
        color: #1e3264;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
        border-left: 3px solid #2f80ed;
        padding-left: 10px;
        font-weight: 700;
      }

      /* Estilos de la grilla para datos de contacto */
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        background-color: #f8fafb;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      /* Estilos para las etiquetas dentro de las grillas de información */
      .info-item label {
        display: block;
        font-size: 11px;
        color: #777777;
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      /* Estilos para los textos con los datos reales dentro de las grillas */
      .info-item span {
        font-size: 15px;
        color: #333333;
        font-weight: 500;
      }
      /* Estilos para los textos  */
      .description-text {
        font-size: 15px;
        line-height: 1.6;
        color: #4f4f4f;
      }

      /* Estilos para el bloque de Certificaciones */
      .cert-list {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      /* Estilos para las cositas individuales de certificación (Mejorado paleta verde ecológica) */
      .cert-badge {
        background-color: #e6f4ea;
        color: #137333;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid rgba(19, 115, 51, 0.1);
      }
      /* Texto gris en cursiva cuando no se encuentran certificaciones */
      .no-certs {
        color: #888888;
        font-style: italic;
        font-size: 14px;
      }

      /* NUEVOS ESTILOS: Inputs del Modo Edición rápidos y limpios */
      .edit-input {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        color: #334155;
        outline: none;
        background-color: #ffffff;
      }
      .edit-input:focus {
        border-color: #2f80ed;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }
      .edit-score-input {
        width: 80px;
        padding: 6px 10px;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        color: #1e3264;
      }

      /* Estilos del Footer */
      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      /* Estilos para el logo del footer */
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px; 
        filter: brightness(0) invert(1);
      }

      /* Estilos para el estado de error si no encuentra proveedor */
      .error-message {
        text-align: center;
        padding: 40px;
        color: #eb5757;
        font-size: 18px;
      }
    </style>
  </head>

  <body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0; background-color: #f8f9fa;">
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div style="position: relative">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />

          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>
    
    <main class="detail-container">
      <a href="ranking.html" class="btn-back" onclick="window.history.back(); return false;">
        ← Volver atrás
      </a>
      <article class="detail-card" id="detail-card-content">
        <div style="text-align: center; color: #666; padding: 20px;">Cargando información del proveedor...</div>
      </article>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>

    <script src="../js/datosPlanos.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const proveedorId = params.get("id");
      const cardContainer = document.getElementById("detail-card-content");

      // Variable global temporal para poder editar en caliente en la pantalla
      let prov = (typeof PROVEEDORES !== 'undefined') ? PROVEEDORES.find(p => p.id === proveedorId) : null;
      let modoEdicion = false;

      function renderProveedor() {
        if (!prov) {
          cardContainer.innerHTML = `
            <div class="error-message">
              <h3>Error: Proveedor No Encontrado</h3>
              <p>El identificador proporcionado no coincide con ningún registro de nuestro sistema.</p>
              <a href="lista-proveedores.html" class="btn-back" style="margin-top: 20px;">Volver al listado principal</a>
            </div>
          `;
          return;
        }

        let colorClase = "bg-rojo"; 
        if (prov.puntaje >= 75) colorClase = "bg-verde";
        else if (prov.puntaje >= 50) colorClase = "bg-amarillo";

        let certsHTML = "";
        if (prov.certificaciones && prov.certificaciones.length > 0) {
          certsHTML = `<div class="cert-list">` + 
            prov.certificaciones.map(c => `<span class="cert-badge">✓ ${c}</span>`).join("") + 
            `</div>`;
        } else {
          certsHTML = `<p class="no-certs">Este proveedor no cuenta con certificaciones ambientales registradas.</p>`;
        }

        const embalaje = prov.embalaje_sostenible ? prov.embalaje_sostenible.charAt(0).toUpperCase() + prov.embalaje_sostenible.slice(1) : "No especificado";
        const energia = prov.energia_renovable ? prov.energia_renovable.charAt(0).toUpperCase() + prov.energia_renovable.slice(1) : "No especificado";
        const cobertura = prov.cobertura ? prov.cobertura.charAt(0).toUpperCase() + prov.cobertura.slice(1) : "No especificada";
        const devolucion = prov.politica_devolucion ? "Sí (Cuenta con logística inversa)" : "No disponible";

        // Renderizado condicional basado en si estamos editando o visualizando
        cardContainer.innerHTML = `
          <div class="detail-header">
            <div>
              <h2>${prov.nombre}</h2>
              <p style="color: #666; margin: 0; font-size: 14px;">Registrado el: ${prov.fecha_registro || 'No disponible'}</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
              <a href="agregar-producto-encargado.html?proveedorId=${prov.id}" 
                 id="btnAgregarProd"
                 style="text-decoration: none; padding: 8px 14px; background-color: #1e3264; color: white; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background-color 0.2s; ${modoEdicion ? 'display:none;' : ''}"
                 onmouseover="this.style.backgroundColor='#243b75'" 
                 onmouseout="this.style.backgroundColor='#1e3264'">
                ➕ Agregar Producto
              </a>
              
              <button class="btn-editar-simulado" id="btnEditarGuardar" onclick="toggleModoEdicion()">
                ${modoEdicion ? "💾 Guardar Cambios" : "Editar Información"}
              </button>

              <div id="puntajeContenedor" style="display: flex; align-items: center; gap: 8px;">
                ${modoEdicion 
                  ? `<span style="font-size:12px; font-weight:bold; color:#1e3264;">Puntaje:</span><input type="number" id="inputPuntaje" class="edit-score-input" min="1" max="100" value="${prov.puntaje}">` 
                  : `<span class="badge-score ${colorClase}">${prov.puntaje} Puntos</span>`
                }
              </div>
            </div>
          </div>

          <div class="info-section">
            <h3>Descripción Comercial</h3>
            ${modoEdicion 
              ? `<textarea id="inputDescripcion" class="edit-input" style="height:80px; resize:vertical;">${prov.descripcion || ''}</textarea>` 
              : `<p class="description-text">${prov.descripcion || "Sin descripción disponible."}</p>`
            }
          </div>

          <div class="info-section">
            <h3>Información de Contacto</h3>
            <div class="info-grid">
              <div class="info-item">
                <label>Representante</label>
                ${modoEdicion ? `<input type="text" id="inputContacto" class="edit-input" value="${prov.contacto || ''}">` : `<span>${prov.contacto || "No asignado"}</span>`}
              </div>
              <div class="info-item">
                <label>Correo Electrónico</label>
                ${modoEdicion ? `<input type="email" id="inputEmail" class="edit-input" value="${prov.email || ''}">` : `<span>${prov.email || "No asignado"}</span>`}
              </div>
              <div class="info-item">
                <label>Teléfono</label>
                ${modoEdicion ? `<input type="text" id="inputTelefono" class="edit-input" value="${prov.telefono || ''}">` : `<span>${prov.telefono || "No asignado"}</span>`}
              </div>
              <div class="info-item">
                <label>Ámbito de Cobertura</label>
                ${modoEdicion ? `<input type="text" id="inputCobertura" class="edit-input" value="${prov.cobertura || ''}">` : `<span>${cobertura}</span>`}
              </div>
            </div>
          </div>

          <div class="info-section">
            <h3>Criterios de Sostenibilidad</h3>
            <div class="info-grid" style="background-color: #f1f8ff; border-color: rgba(47, 128, 237, 0.1);">
              <div class="info-item">
                <label>Embalaje Sostenible</label>
                ${modoEdicion ? `<input type="text" id="inputEmbalaje" class="edit-input" value="${prov.embalaje_sostenible || ''}">` : `<span>${embalaje}</span>`}
              </div>
              <div class="info-item">
                <label>Uso de Energías Renovables</label>
                ${modoEdicion ? `<input type="text" id="inputEnergia" class="edit-input" value="${prov.energia_renovable || ''}">` : `<span>${energia}</span>`}
              </div>
              <div class="info-item">
                <label>Política de Devolución</label>
                ${modoEdicion 
                  ? `
                    <select id="inputDevolucion" class="edit-input">
                      <option value="true" ${prov.politica_devolucion ? 'selected' : ''}>Sí (Cuenta con logística inversa)</option>
                      <option value="false" ${!prov.politica_devolucion ? 'selected' : ''}>No disponible</option>
                    </select>
                    ` 
                  : `<span>${devolucion}</span>`
                }
              </div>
            </div>
          </div>

          <div class="info-section">
            <h3>Certificaciones Oficiales</h3>
            ${certsHTML}
          </div>

          <div class="info-section" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 280px;">
              <h3>Desafíos Actuales</h3>
              ${modoEdicion ? `<textarea id="inputDesafios" class="edit-input" style="height:60px; resize:vertical;">${prov.desafios || ''}</textarea>` : `<p class="description-text" style="font-size: 14px;">${prov.desafios || "No declarados."}</p>`}
            </div>
            <div style="flex: 1; min-width: 280px;">
              <h3>Metas de Sostenibilidad</h3>
              ${modoEdicion ? `<textarea id="inputMetas" class="edit-input" style="height:60px; resize:vertical;">${prov.metas || ''}</textarea>` : `<p class="description-text" style="font-size: 14px;">${prov.metas || "No declaradas."}</p>`}
            </div>
          </div>
        `;
      }

      // MODIFICADO: Lógica interactiva para alternar inputs y simular guardado
      function toggleModoEdicion() {
        if (modoEdicion) {
          // Fase Guardar: capturar valores digitados
          const nuevoPuntaje = parseInt(document.getElementById("inputPuntaje").value);
          
          if (isNaN(nuevoPuntaje) || nuevoPuntaje < 1 || nuevoPuntaje > 100) {
            alert("Por favor, asigne un puntaje manual válido entre 1 y 100.");
            return;
          }

          // Actualizamos el objeto en memoria
          prov.puntaje = nuevoPuntaje;
          prov.descripcion = document.getElementById("inputDescripcion").value;
          prov.contacto = document.getElementById("inputContacto").value;
          prov.email = document.getElementById("inputEmail").value;
          prov.telefono = document.getElementById("inputTelefono").value;
          prov.cobertura = document.getElementById("inputCobertura").value;
          prov.embalaje_sostenible = document.getElementById("inputEmbalaje").value;
          prov.energia_renovable = document.getElementById("inputEnergia").value;
          prov.politica_devolucion = document.getElementById("inputDevolucion").value === "true";
          prov.desafios = document.getElementById("inputDesafios").value;
          prov.metas = document.getElementById("inputMetas").value;

          modoEdicion = false;
          alert("Información actualizada correctamente");
          renderProveedor();
        } else {
          // Fase Editar: activar modo inputs
          modoEdicion = true;
          renderProveedor();
        }
      }

      // Inicializar la pantalla
      document.addEventListener("DOMContentLoaded", renderProveedor);
    </script>
    
    <script>
      function toggleMenu() {
        const menu = document.getElementById("menuDropdown");
        if (menu.style.display === "none" || menu.style.display === "") {
          menu.style.display = "block";
        } else {
          menu.style.display = "none";
        }
      }
      
      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("header nav img");

        if (menu && menu.style.display === "block" && event.target !== avatar && !menu.contains(event.target)) {
          menu.style.display = "none";
        }
      };
    </script>
  </body>
</html>
