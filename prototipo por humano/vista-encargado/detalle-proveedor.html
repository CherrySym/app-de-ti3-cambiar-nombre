 .detail-header {

 .info-section {

 .info-section h3 {

 .info-grid {

 /* Tabla de Productos Asociados */
 .product-table-responsive {

 <body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0; background-color: #f8f9fa;">
 <header>
 <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
 <nav>
 <div style="position: relative">
 <img
 src="../assets/icono generico de usuario.png"
 alt="Perfil"
 onclick="toggleMenu()"
 style="
 width: 38px;
 height: 38px;
 border-radius: 50%;
 cursor: pointer;
 display: block;
 "
 />

 <div id="menuDropdown" class="dropdown-content" style="display: none">
 <div class="dropdown-user-info">
 <strong id="perfilUsuario">Encargado de Compras</strong>
 <span id="perfilEmail">compras@correo.ucu.edu.uy</span>
 </div>
 <hr />
 <a href="../login.html" onclick="sessionStorage.clear()" class="logout-link">Cerrar Sesión</a>
 </div>
 </div>
 </nav>
 </header>
 
 <main class="detail-container">
 <a href="ranking.html" class="btn-back">
 ← Volver atrás
 </a>
 <article class="detail-card" id="detail-card-content">
 <div style="text-align: center; color: #666; padding: 20px;">Cargando información del proveedor y catálogo...</div>
 </article>
 </main>

 <footer>
 <div class="footer-container">
 <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
 </div>
 </footer>

 <script type="module">
 import { supabaseClient } from '../js/conexion-bd.js';

 const params = new URLSearchParams(window.location.search);
 const proveedorId = params.get("id");
 const cardContainer = document.getElementById("detail-card-content");

 // PDF de prueba por defecto si la base de datos no tiene una URL cargada
 const PDF_DE_PRUEBA = "https://pdfobject.com/pdf/sample.pdf";

 let prov = null;
 let productosProv = []; // Catálogo del proveedor en memoria local
 let modoEdicion = false;

 // --- MENÚ DESPLEGABLE GLOBAL ---
 window.toggleMenu = function() {
 const menu = document.getElementById("menuDropdown");
 menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
 }
 
 window.onclick = function (event) {
 const menu = document.getElementById("menuDropdown");
 const avatar = document.querySelector("header nav img");
 if (menu && menu.style.display === "block" && event.target !== avatar && !menu.contains(event.target)) {
 menu.style.display = "none";
 }
 };

 // --- CARGAR PROVEEDOR Y SUS PRODUCTOS ---
 async function obtenerDatosCompletos() {
 if (!proveedorId) {
 renderError("No se proporcionó un ID de proveedor válido.");
 return;
 }

 try {
 // Consulta 1: Datos del Proveedor
 const { data: proveedorData, error: provError } = await supabaseClient
 .from('proveedores_ucu')
 .select('*')
 .eq('id', proveedorId)
 .single();

 if (provError || !proveedorData) {
 renderError("El identificador proporcionado no coincide con ningún registro.");
 return;
 }

 prov = proveedorData;

 // Consulta 2: Productos Asociados
 const { data: productosData, error: prodError } = await supabaseClient
 .from('productos_ucu')
 .select('*')
 .eq('proveedor_id', proveedorId)
 .order('nombre', { ascending: true });

 if (prodError) {
 console.error("Error al consultar productos:", prodError);
 } else {
 // FILTRADO EXCLUSIVO: No se muestran aquellos con estado 'pendiente'
 productosProv = (productosData || []).filter(p => p.estado !== 'pendiente');
 }

 renderProveedor();
 } catch (err) {
 console.error(err);
 renderError("Ocurrió un error al conectar con la base de datos.");
 }
 }

 function renderError(mensaje) {
 cardContainer.innerHTML = `
 <div class="error-message">
 <h3>Error al cargar</h3>
 <p>${mensaje}</p>
 <a href="ranking.html" class="btn-back" style="margin-top: 20px;">Volver al listado principal</a>
 </div>
 `;
 }

 // --- CONVERSOR DE COMPROBANTES DE PROVEEDOR (CON CASO DE RESPALDO PDF) ---
 function generarCertificadosProveedorHTML() {
 let certsHTML = `<div class="cert-list">`;
 let tieneCerts = false;

 const urls = prov.urls_certificaciones || [];

 if (prov.tiene_iso14001) {
 // Si no hay URL asociada, asigna el PDF de prueba de respaldo
 const urlISO = urls[0] || PDF_DE_PRUEBA;
 certsHTML += `<a href="${urlISO}" target="_blank" class="cert-badge" style="text-decoration: none;">✓ ISO 14001 🔗</a>`;
 tieneCerts = true;
 }

 if (prov.tiene_emas) {
 const indexEMAS = prov.tiene_iso14001 ? 1 : 0;
 // Si no hay URL asociada, asigna el PDF de prueba de respaldo
 const urlEMAS = urls[indexEMAS] || urls[0] || PDF_DE_PRUEBA;
 certsHTML += `<a href="${urlEMAS}" target="_blank" class="cert-badge" style="text-decoration: none;">✓ Registro EMAS 🔗</a>`;
 tieneCerts = true;
 }

 // Si existen URLs adicionales no asignadas de forma fija
 if (urls.length > (prov.tiene_iso14001 && prov.tiene_emas ? 2 : (prov.tiene_iso14001 || prov.tiene_emas ? 1 : 0))) {
 urls.forEach((url, i) => {
 if (i >= 2) {
 certsHTML += `<a href="${url || PDF_DE_PRUEBA}" target="_blank" class="cert-badge" style="background-color: #f1f5f9; color: #1e293b; text-decoration: none;">📄 Documento Extra ${i + 1} 🔗</a>`;
 tieneCerts = true;
 }
 });
 }

 certsHTML += `</div>`;

 if (!tieneCerts) {
 certsHTML = `<p class="no-certs">Este proveedor no cuenta con certificaciones ambientales empresariales activas.</p>`;
 }
 return certsHTML;
 }

 // --- CONVERSOR DE LA TABLA DE PRODUCTOS ---
 function generarTablaProductosHTML() {
 if (productosProv.length === 0) {
 return `
 <tr>
 <td colspan="8" style="text-align: center; color: #666; padding: 25px; font-style: italic;">
 Este proveedor no cuenta con productos activos en su catálogo.
 </td>
 </tr>
 `;
 }

 return productosProv.map((p) => {
 // Las respuestas booleanas se muestran estrictamente en mayúsculas "SI" y "NO"
 const reciclableTxt = p.es_reciclable ? "SI" : "NO";
 const reusableTxt = p.es_reusable ? "SI" : "NO";

 // Estilo de colores condicionales: verde para SI, rojo para NO
 const reciclableColor = p.es_reciclable ? "#219653" : "#eb5757";
 const reusableColor = p.es_reusable ? "#219653" : "#eb5757";

 // Certificado FSC a nivel del producto (con enlace real o PDF de prueba por defecto)
 let fscHTML = `<span style="color: #94a3b8; font-weight: 600; font-size: 11px;">NO</span>`;
 if (p.tiene_fsc) {
 const urlFSC = p.url_certificado || PDF_DE_PRUEBA;
 fscHTML = `<a href="${urlFSC}" target="_blank" class="cert-badge" style="background-color: #e6f4ea; color: #137333; text-decoration: none; font-weight: 600; font-size: 11px; padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(19,115,51,0.15);">✓ FSC 🔗</a>`;
 }

 const matRecicladoHTML = p.mat_reciclados_pct !== null ? `${p.mat_reciclados_pct}%` : "0%";

 return `
 <tr>
 <td style="font-family: monospace; font-size: 11px; color: #64748b;">${p.codigo_producto}</td>
 <td><strong>${p.nombre}</strong></td>
 <td>${p.categoria || 'Sin categoría'}</td>
 <td style="font-weight: 600; color: #1e3264;">$${parseFloat(p.precio).toFixed(2)}</td>
 <td>${matRecicladoHTML}</td>
 <td style="font-weight: bold; color: ${reciclableColor};">${reciclableTxt}</td>
 <td style="font-weight: bold; color: ${reusableColor};">${reusableTxt}</td>
 <td style="text-align: center;">${fscHTML}</td>
 </tr>
 `;
 }).join("");
 }

 function renderProveedor() {
 const puntajeActual = prov.puntaje_total || 0;

 // SEMÁFORO CORREGIDO: Amarillo en puntajes >= 45 y < 75
 let colorClase = "bg-rojo"; 
 if (puntajeActual >= 75) colorClase = "bg-verde";
 else if (puntajeActual >= 45) colorClase = "bg-amarillo";

 const procedenciaTexto = prov.procedencia
 ? prov.procedencia.charAt(0).toUpperCase() + prov.procedencia.slice(1).toLowerCase()
 : "No especificado";

 // TEXTOS SIMPLIFICADOS CON SENTIDO CLARO
 const mayoristaTexto = prov.es_mayorista ? "Mayorista" : "Minorista";
 const embalajeTexto = prov.embalaje_sostenible ? "Sí" : "No";

 let fechaFormateada = "No disponible";
 if (prov.fecha_registro) {
 fechaFormateada = new Date(prov.fecha_registro).toLocaleDateString('es-UY', { year: 'numeric', month: 'long', day: 'numeric' });
 }

 cardContainer.innerHTML = `
 <div class="detail-header">
 <div>
 <h2>${prov.nombre}</h2>
 <p style="color: #666; margin: 0; font-size: 14px;">Código: <strong>${prov.id_codigo}</strong> | Registrado el: ${fechaFormateada}</p>
 </div>
 <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
 <a href="agregar-producto-encargado.html?proveedorId=${prov.id}" 
 id="btnAgregarProd"
 style="text-decoration: none; padding: 8px 14px; background-color: #1e3264; color: white; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background-color 0.2s; ${modoEdicion ? 'display:none;' : ''}"
 onmouseover="this.style.backgroundColor='#243b75'" 
 onmouseout="this.style.backgroundColor='#1e3264'">
 ➕ Agregar Producto
 </a>
 
 ${modoEdicion 
 ? `
 <button class="btn-guardar-simulado" id="btnEditarGuardar">💾 Guardar Cambios</button>
 <button class="btn-cancelar-simulado" id="btnCancelarEdicion">❌ Cancelar</button>
 `
 : `
 <button class="btn-editar-simulado" id="btnEditarGuardar">Editar Información</button>
 <button class="btn-cancelar-simulado" id="btnEliminarProveedor" style="background-color: #fee2e2; color: #dc3545; border: 1px solid #dc3545;">Eliminar Proveedor</button>
 `
 }

 <div id="puntajeContenedor" style="display: flex; align-items: center; gap: 8px;">
 ${modoEdicion 
 ? `<span style="font-size:12px; font-weight:bold; color:#1e3264;">Puntaje:</span><input type="number" id="inputPuntaje" class="edit-score-input" min="0" max="100" value="${puntajeActual}">` 
 : `<span class="badge-score ${colorClase}">${puntajeActual} Puntos</span>`
 }
 </div>
 </div>
 </div>

 <div class="info-section">
 <h3>Descripción Comercial</h3>
 ${modoEdicion 
 ? `<textarea id="inputDescripcion" class="edit-input" style="height:80px; resize:vertical;" maxlength="1000">${prov.descripcion || ''}</textarea>` 
 : `<p class="description-text">${prov.descripcion || "Sin descripción disponible."}</p>`
 }
 </div>

 <div class="info-section">
 <h3>Información de Contacto y Operación</h3>
 <div class="info-grid">
 <div class="info-item">
 <label>Representante</label>
 ${modoEdicion ? `<input type="text" id="inputContacto" class="edit-input" value="${prov.contacto_persona || ''}" maxlength="45">` : `<span>${prov.contacto_persona || "No asignado"}</span>`}
 </div>
 <div class="info-item">
 <label>Correo Electrónico</label>
 ${modoEdicion ? `<input type="email" id="inputEmail" class="edit-input" value="${prov.email || ''}" maxlength="60">` : `<span>${prov.email || "No asignado"}</span>`}
 </div>
 <div class="info-item">
 <label>Teléfono</label>
 ${modoEdicion ? `<input type="text" id="inputTelefono" class="edit-input" value="${prov.telefono || ''}" maxlength="20">` : `<span>${prov.telefono || "No asignado"}</span>`}
 </div>
 <div class="info-item">
 <label>Procedencia</label>
 ${modoEdicion 
 ? `
 <select id="inputProcedencia" class="edit-input">
 <option value="nacional" ${prov.procedencia === 'nacional' ? 'selected' : ''}>Nacional</option>
 <option value="internacional" ${prov.procedencia === 'internacional' ? 'selected' : ''}>Internacional</option>
 </select>
 `
 : `<span>${procedenciaTexto}</span>`
 }
 </div>
 <div class="info-item">
 <label>RUT </label>
 ${modoEdicion ? `<input type="text" id="inputRut" class="edit-input" value="${prov.rut || ''}" maxlength="30">` : `<span>${prov.rut || "No disponible"}</span>`}
 </div>
 <div class="info-item">
 <label>Tipo de Comercio</label>
 ${modoEdicion 
 ? `
 <select id="inputMayorista" class="edit-input">
 <option value="true" ${prov.es_mayorista ? 'selected' : ''}>Mayorista</option>
 <option value="false" ${!prov.es_mayorista ? 'selected' : ''}>Minorista</option>
 </select>
 `
 : `<span>${mayoristaTexto}</span>`
 }
 </div>
 <div class="info-item" style="grid-column: span 2;">
 <label>Sitio Web</label>
 ${modoEdicion ? `<input type="text" id="inputSitioWeb" class="edit-input" value="${prov.sitio_web || ''}" maxlength="200">` : `<span>${prov.sitio_web ? `<a href="${prov.sitio_web}" target="_blank">${prov.sitio_web}</a>` : "No disponible"}</span>`}
 </div>
 </div>
 </div>

 <div class="info-section">
 <h3>Criterios de Sostenibilidad</h3>
 <div class="info-grid" style="background-color: #f1f8ff; border-color: rgba(47, 128, 237, 0.1);">
 <div class="info-item">
 <label>Embalaje Sostenible</label>
 ${modoEdicion 
 ? `
 <select id="inputEmbalaje" class="edit-input">
 <option value="true" ${prov.embalaje_sostenible ? 'selected' : ''}>Sí</option>
 <option value="false" ${!prov.embalaje_sostenible ? 'selected' : ''}>No</option>
 </select>
 ` 
 : `<span>${embalajeTexto}</span>`
 }
 </div>
 </div>
 </div>

 <div class="info-section">
 <h3>Certificaciones Oficiales del Proveedor</h3>
 ${generarCertificadosProveedorHTML()}
 </div>

 <!-- LISTADO DE PRODUCTOS DEL PROVEEDOR (FILTRADOS POR ESTADO) -->
 <div class="info-section" style="margin-top: 40px; border-top: 2px solid #f0f0f0; padding-top: 25px;">
 <h3>Productos Ofertados por este Proveedor</h3>
 <div class="product-table-responsive">
 <table class="product-table">
 <thead>
 <tr>
 <th>Código</th>
 <th>Nombre</th>
 <th>Categoría</th>
 <th>Precio</th>
 <th>Mat. Reciclado</th>
 <th>Reciclable</th>
 <th>Reusable</th>
 <th style="text-align: center;">Certificaciones</th>
 </tr>
 </thead>
 <tbody id="product-list-body">
 ${generarTablaProductosHTML()}
 </tbody>
 </table>
 </div>
 </div>
 `;

 // RE-VINCULAR EVENTOS
 document.getElementById("btnEditarGuardar").addEventListener("click", toggleModoEdicion);
 if (modoEdicion) {
 document.getElementById("btnCancelarEdicion").addEventListener("click", cancelarEdicion);
 } else {
 document.getElementById("btnEliminarProveedor").addEventListener("click", eliminarProveedorYProductos);
 }
 }

 async function toggleModoEdicion() {
 if (modoEdicion) {
 const nuevoPuntaje = parseFloat(document.getElementById("inputPuntaje").value);
 
 if (isNaN(nuevoPuntaje) || nuevoPuntaje < 0 || nuevoPuntaje > 100) {
 alert("Por favor, asigne un puntaje manual válido entre 0 y 100.");
 return;
 }

 const btn = document.getElementById("btnEditarGuardar");
 const textOriginal = btn.innerText;
 btn.innerText = "⏳ Guardando...";
 btn.disabled = true;

 const actualizaciones = {
 puntaje_total: nuevoPuntaje,
 descripcion: document.getElementById("inputDescripcion").value,
 contacto_persona: document.getElementById("inputContacto").value,
 email: document.getElementById("inputEmail").value,
 telefono: document.getElementById("inputTelefono").value,
 procedencia: document.getElementById("inputProcedencia").value,
 rut: document.getElementById("inputRut").value || null,
 es_mayorista: document.getElementById("inputMayorista").value === "true",
 sitio_web: document.getElementById("inputSitioWeb").value || null,
 embalaje_sostenible: document.getElementById("inputEmbalaje").value === "true"
 };

 try {
 const { error } = await supabaseClient
 .from('proveedores_ucu')
 .update(actualizaciones)
 .eq('id', proveedorId);

 if (error) throw error;

 prov = { ...prov, ...actualizaciones };
 modoEdicion = false;
 alert("Información actualizada correctamente en Supabase.");
 renderProveedor();
 } catch (err) {
 console.error(err);
 alert("Error al intentar guardar los cambios.");
 btn.innerText = textOriginal;
 btn.disabled = false;
 }
 } else {
 modoEdicion = true;
 renderProveedor();
 }
 }

 function cancelarEdicion() {
 modoEdicion = false;
 renderProveedor(); 
 }

 // --- FUNCIÓN DE ELIMINACIÓN CON AVISO DE CONFIRMACIÓN ---
 async function eliminarProveedorYProductos() {
 const confirmacion = confirm(
 `\n\n¿Está seguro de que desea eliminar al proveedor "${prov.nombre}"?\n\nEsta acción es irreversible y eliminará de forma permanente al proveedor junto con todos sus productos registrados en el sistema.`
 );

 if (!confirmacion) return;

 try {
 const btnEliminar = document.getElementById("btnEliminarProveedor");
 btnEliminar.innerText = "⏳ Eliminando...";
 btnEliminar.disabled = true;

 // 1. Eliminar productos primero (previene violaciones de clave foránea en BD)
 const { error: errorProd } = await supabaseClient
 .from('productos_ucu')
 .delete()
 .eq('proveedor_id', proveedorId);

 if (errorProd) throw errorProd;

 // 2. Eliminar el registro del proveedor
 const { error: errorProv } = await supabaseClient
 .from('proveedores_ucu')
 .delete()
 .eq('id', proveedorId);

 if (errorProv) throw errorProv;

 alert("El proveedor y todos sus productos fueron eliminados con éxito.");
 
 // Redirección directa para evitar bucles en el historial de navegación
 window.location.href = "ranking.html";
 } catch (err) {
 console.error("Error en la eliminación:", err);
 alert("Ocurrió un error inesperado al intentar eliminar al proveedor.");
 
 const btnEliminar = document.getElementById("btnEliminarProveedor");
 if (btnEliminar) {
 btnEliminar.innerText = "Eliminar Proveedor";
 btnEliminar.disabled = false;
 }
 }
 }

 // --- INICIALIZACIÓN DE LA VISTA ---
 obtenerDatosCompletos();

 // --- MANEJO DEL USUARIO EN SESIÓN ---
 const usuarioLogueado = sessionStorage.getItem("usuarioUCU");
 if (usuarioLogueado) {
 const partes = usuarioLogueado.split(".");
 const nombreCompleto = partes
 .map((p) => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase())
 .join(" ");
 const profileName = document.getElementById("perfilUsuario");
 const profileEmail = document.getElementById("perfilEmail");
 if (profileName) profileName.innerText = nombreCompleto;
 if (profileEmail) {
 profileEmail.innerText = `${usuarioLogueado.toLowerCase()}@correo.ucu.edu.uy`;
 }
 }
 </script>
