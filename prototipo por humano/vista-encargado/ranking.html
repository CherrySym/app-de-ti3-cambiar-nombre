<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking de Proveedores - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css"/>
    <style>
      /* Estilos para el logo del Header */
      .logo {
        display: block;
        height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }
      
      /* Estilos del Header */
      header {
        background-color: #1e3264;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }
      /* Estilos para que los enlaces y el avatar del nav estén en la misma línea */
      header nav {
        display: flex;
        align-items: center;
        gap: 25px;
      }
      /* Estilos para la lista del nav*/
      header nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
      }
      /* Estilos de los enlaces individuales del nav */
      header nav ul li a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
      }
      /* Cambio de color al pasar el mouse por los enlaces del nav */
      header nav ul li a:hover {
        color: #2f80ed;
      }
      
      /* Estilos para el contenedor del menu flotante que aparece al hacer click en el icono de usuario */
      .dropdown-content {
        position: absolute;
        right: 0;
        top: 45px; 
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        padding: 12px 0;
        z-index: 1000;
      }
      /* Estilos para la sección interna con el nombre y mail del usuario */
      .dropdown-user-info {
        padding: 4px 16px 8px 16px;
        display: flex;
        flex-direction: column;
      }
      /* Texto en negrita para el nombre del usuario */
      .dropdown-user-info strong {
        font-size: 14px;
        color: #13213c;
      }
      /* Texto gris y más chico para el correo */
      .dropdown-user-info span {
        font-size: 12px;
        color: #555555;
      }
      /* Línea divisoria del menú desplegable */
      .dropdown-content hr {
        border: 0;
        border-top: 1px solid #eeeeee;
        margin: 8px 0;
      }
      /* Estilos para el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link {
        color: #dc3545;
        padding: 8px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        font-weight: 500;
      }
      /* Cambio de color al pasar el mouse por el enlace de "Cerrar Sesión" */
      .dropdown-content .logout-link:hover {
        background-color: #fff5f5;
      }

      /* Estilos del contenedor del ranking  */
      .ranking-container {
        flex: 1;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
        width: 100%;
      }

      /* Contenedor para el botón de volver y el titulo "Ranking de Proveedores" */
      .ranking-header {
        margin-bottom: 25px;
      }

      /* Estilo para el botón de "Volver atrás" */
      .btn-back-list {
        display: inline-flex;
        align-items: center;
        color: #1e3264;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 15px;
        transition: color 0.2s;
        gap: 5px;
      }
      /* Efecto al pasar el mouse por el botón de regresar */
      .btn-back-list:hover {
        color: #2f80ed;
      }
      /* Estilos para el título principal del ranking */
      .ranking-container h2 {
        font-size: 26px;
        color: #13213c;
        margin: 0 0 8px 0;
        font-weight: 700;
      }
      /* Estilos para el subtítulo debajo del título principal */
      .ranking-container p {
        color: #555555;
        font-size: 15px;
        margin: 0;
      }

      /* Estilos para el contenedor de la tabla */
      .table-responsive {
        background-color: #ffffff;
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        overflow: hidden; 
        margin-top: 20px;
      }
      /* Estilo para la tabla del ranking */
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 15px;
      }
      /* Encabezados de la tabla con fondo azul institucional y texto blanco */
      th {
        background-color: #1e3264;
        color: white;
        padding: 15px;
        font-weight: 600;
      }
      /* Celdas con un borde inferior gris*/
      td {
        padding: 15px;
        border-bottom: 1px solid #eeeeee;
        color: #333333;
      }

      /* Efecto cebra en las filas de la tabla */
      tr:nth-child(even) td {
        background-color: #f9fafb;
      }

      /* Resaltado en la fila al pasar el mouse por encima */
      tr:hover td {
        background-color: #f1f5f9;
      }

      /* Estilos para las insignias del puntaje */
      .badge-score {
        color: white;
        padding: 4px 10px;
        border-radius: 6px;
        font-weight: 700;
        font-size: 13px;
        display: inline-block;
      }
      /* El color de fondo de las insignias dependiendo el puntaje */
      .bg-verde { background-color: #219653; }
      .bg-amarillo { background-color: #f2c94c; color: #333333; }
      .bg-rojo { background-color: #eb5757; }

      /* Estilos para los enlaces de Acciones */
      .btn-detail {
        color: #2f80ed;
        text-decoration: none;
        font-weight: 600;
      }
      /* Efecto hover en los enlaces de acción */
      .btn-detail:hover {
        color: #1e3264;
        text-decoration: underline;
      }

      /* Estilos del Footer */
      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      /* Estilos para el logo del Footer */
      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }
    </style>
  </head>

  <body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0; background-color: #f8f9fa;">
    <header>
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo" />
      <nav>
        <div style="position: relative">
          <img
            src="../assets/icono generico de usuario.png"
            alt="Perfil"
            onclick="toggleMenu()"
            style="
              width: 38px;
              height: 38px;
              border-radius: 50%;
              cursor: pointer;
              display: block;
            "
          />

          <div id="menuDropdown" class="dropdown-content" style="display: none">
            <div class="dropdown-user-info">
              <strong>Encargado de Compras</strong>
              <span>compras@correo.ucu.edu.uy</span>
            </div>
            <hr />
            <a href="../login.html" class="logout-link">Cerrar Sesión</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="ranking-container">
      <div class="ranking-header">
        <a href="#" onclick="window.history.back(); return false;" class="btn-back-list">
          ← Volver atrás
        </a>
        <h2>Ranking de Sostenibilidad</h2>
        <p>Proveedores ordenados por su puntaje de cumplimiento ambiental e institucional.</p>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Proveedor</th>
              <th>Puntaje</th>
              <th>Procedencia</th>
              <th>Detalles</th>
              <th>Productos</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr>
              <td colspan="6" style="text-align: center; color: #666; padding: 30px;">
                Cargando el ranking de proveedores...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer"/>
      </div>
    </footer>

    <script type="module">
      import { supabaseClient } from '../js/conexion-bd.js';

      const tbody = document.getElementById("tabla-body");

      // --- FUNCIONES DEL MENÚ DESPLEGABLE ---
      // Para que onclick="toggleMenu()" funcione desde el HTML usando módulos,
      // debemos asignarla explícitamente al objeto global window.
      window.toggleMenu = function() {
        const menu = document.getElementById("menuDropdown");
        if (menu.style.display === "none" || menu.style.display === "") {
          menu.style.display = "block";
        } else {
          menu.style.display = "none";
        }
      }
      
      window.onclick = function (event) {
        const menu = document.getElementById("menuDropdown");
        const avatar = document.querySelector("header nav img");

        if (menu && menu.style.display === "block" && event.target !== avatar && !menu.contains(event.target)) {
          menu.style.display = "none";
        }
      };

      // --- CARGA DE DATOS DESDE SUPABASE ---
      async function cargarRanking() {
        try {
          const { data: proveedores, error } = await supabaseClient
            .from('proveedores_ucu')
            .select('id, id_codigo, nombre, puntaje_total, procedencia')
            .eq('tipo', 'proveedor')
            .order('puntaje_total', { ascending: false });

          if (error) throw error;

          if (!proveedores || proveedores.length === 0) {
            tbody.innerHTML = `
              <tr>
                <td colspan="6" style="text-align: center; color: #555555; padding: 30px;">
                  No hay proveedores registrados u homologados actualmente.
                </td>
              </tr>
            `;
            return;
          }

          tbody.innerHTML = "";

          proveedores.forEach(p => {
            const fila = document.createElement("tr");
            const puntajeReal = p.puntaje_total !== null ? parseFloat(p.puntaje_total) : 0;
            
            let colorClase = "bg-rojo"; 
            if (puntajeReal >= 75) {
              colorClase = "bg-verde"; 
            } else if (puntajeReal >= 50) {
              colorClase = "bg-amarillo"; 
            }

            const procedenciaFormateada = p.procedencia 
              ? p.procedencia.charAt(0).toUpperCase() + p.procedencia.slice(1) 
              : "Nacional";

            fila.innerHTML = `
              <td style="color: #666; font-size: 13px;"><code>${p.id_codigo}</code></td>
              <td><strong>${p.nombre}</strong></td>
              <td><span class="badge-score ${colorClase}">${puntajeReal.toFixed(1)} pts</span></td>
              <td>${procedenciaFormateada}</td>
              <td><a href="detalle-proveedor.html?id=${p.id}" class="btn-detail">Ver detalles →</a></td>
              <td><a href="compras.html?id=${p.id}" class="btn-detail">Ver productos →</a></td>
            `;
            tbody.appendChild(fila);
          });

        } catch (err) {
          console.error("Error al obtener proveedores de Supabase:", err);
          tbody.innerHTML = `
            <tr>
              <td colspan="6" style="text-align: center; color: #eb5757; padding: 30px; font-weight: 600;">
                Ocurrió un error al conectar con el servidor de la base de datos 'proveedores_ucu'.
              </td>
            </tr>
          `;
        }
      }

      // Ejecutar la carga cuando el árbol DOM esté listo
      document.addEventListener("DOMContentLoaded", cargarRanking);
    </script>
  </body>
</html>
