<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agregar Producto - UCU</title>
    <link rel="stylesheet" href="../css/global-styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background-color: #f4f6f9;
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .form-container {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .form-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(19, 33, 60, 0.1);
        border-radius: 24px;
        padding: 35px;
        width: 100%;
        max-width: 750px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.05);
      }

      .form-card h2 {
        color: #1e3264;
        font-size: 28px;
        margin-top: 10px;
        margin-bottom: 5px;
        font-weight: 700;
      }

      .form-card .subtitle {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 25px;
      }

      .section-divider {
        border: 0;
        height: 1px;
        background: #e2e8f0;
        margin: 20px 0;
      }

      .form-row {
        display: flex;
        gap: 20px;
        width: 100%;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        flex: 1;
      }

      .form-group label {
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .form-input,
      .form-select,
      .form-textarea {
        padding: 12px 16px;
        border: 1px solid rgba(19, 33, 60, 0.2);
        border-radius: 8px;
        font-size: 14px;
        background-color: #ffffff;
        color: #333333;
        outline: none;
        font-family: Arial, sans-serif;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
      }

      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        border-color: #1e3264;
        box-shadow: 0 0 0 3px rgba(30, 50, 100, 0.15);
      }

      .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 5px;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500 !important;
        cursor: pointer;
        color: #475569;
        font-size: 14px;
      }

      .checkbox-label input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .form-input::file-selector-button {
        background: rgba(30, 50, 100, 0.1);
        color: #1e3264;
        border: none;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 600;
        margin-right: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-submit-prov {
        background: linear-gradient(135deg, #1e3264 0%, #13213c 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        box-shadow: 0 4px 15px rgba(30, 50, 100, 0.3);
        transition:
          transform 0.2s,
          background-color 0.2s;
        margin-top: 10px;
      }

      .btn-submit-prov:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #243b75 0%, #1a2c52 100%);
        box-shadow: 0 6px 20px rgba(30, 50, 100, 0.4);
      }

      .btn-submit-prov:active {
        transform: translateY(0);
      }

      .btn-back {
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 10px 20px;
        border-radius: 8px;
        background-color: #1e3264;
        color: #ffffff;
        border: 2px solid #1e3264;
        transition: all 0.2s ease-in-out;
        font-size: 14px;
      }

      .btn-back:hover {
        background-color: #ffffff;
        color: #1e3264;
        border-color: #1e3264;
      }

      .provider-info-box {
        background: #e0e7ff;
        border: 1px solid #c7d2fe;
        padding: 15px 20px;
        border-radius: 12px;
        color: #1e1b4b;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .footer-container {
        background-color: #1e3264;
        padding: 20px 0;
        width: 100%;
        margin-top: auto;
      }

      .logo-footer {
        display: block;
        margin: auto;
        height: 30px;
        filter: brightness(0) invert(1);
      }

      @media (max-width: 600px) {
        .form-row {
          flex-direction: column;
          gap: 0;
        }
      }
    </style>
  </head>
  <body
    style="
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background-color: #f4f6f9;
    "
  >
    <main class="form-container">
      <section class="form-card">
        <div style="margin-bottom: 25px">
          <a href="../index.html" class="btn-back"> ← Volver al Inicio </a>
        </div>

        <span style="color: #dc3545; font-size: 13px">* Campos requeridos</span>

        <h2>Agregar Nuevo Producto</h2>
        <p class="subtitle">
          Proponga nuevos artículos sostenibles para incorporar al catálogo.
        </p>

        <div class="provider-info-box">
          Proveedor:
          <span
            id="nombreProveedorDisplay"
            style="font-weight: 700; color: #1e3264"
            >Verificando proveedor...</span
          >
        </div>

        <hr class="section-divider" />

        <form id="formProducto" onsubmit="enviarSugerenciaProducto(event)">
          <div class="form-row">
            <div class="form-group">
              <label for="prodNombre">Nombre del Producto *</label>
              <input
                type="text"
                id="prodNombre"
                required
                class="form-input"
                placeholder="Ej: Resma A4 80g Reciclada"
                maxlength="75"
              />
            </div>
            <div class="form-group">
              <label for="prodPrecio">Precio Sugerido (UYU) *</label>
              <input
                type="number"
                id="prodPrecio"
                required
                class="form-input"
                placeholder="Monto en pesos"
                min="0.01"
                step="0.01"
                max="99990.99"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="prodCategoria">Categoría del Insumo *</label>
              <select id="prodCategoria" required class="form-select">
                <option value="" disabled selected>Seleccione...</option>
                <option value="papel">Papel</option>
                <option value="escritura">Escritura</option>
                <option value="embalaje">Embalaje</option>
                <option value="archivo">Archivo / Organización</option>
              </select>
            </div>
            <div class="form-group">
              <label for="prodPct">% Material Reciclado *</label>
              <input
                type="number"
                id="prodPct"
                required
                class="form-input"
                placeholder="0 a 100"
                min="0"
                max="100"
              />
            </div>
          </div>

          <div class="form-row">
            <fieldset
              class="form-group"
              style="border: none; padding: 0; margin: 0 0 10px 0"
            >
              <legend
                style="
                  font-weight: 600;
                  color: #334155;
                  margin-bottom: 8px;
                  font-size: 14px;
                "
              >
                Propiedades Sostenibles del Producto:
              </legend>
              <div class="checkbox-group">
                <label class="checkbox-label"
                  ><input type="checkbox" id="prodReciclable" /> ¿Es
                  Reciclable?</label
                >
                <label class="checkbox-label"
                  ><input type="checkbox" id="prodReutilizable" /> ¿Es
                  Reusable?</label
                >
              </div>
            </fieldset>
          </div>

          <div class="form-row">
            <fieldset
              class="form-group"
              style="border: none; padding: 0; margin: 0 0 20px 0"
            >
              <legend
                style="
                  font-weight: 600;
                  color: #334155;
                  margin-bottom: 8px;
                  font-size: 14px;
                "
              >
                Certificaciones Ambientales del producto:
              </legend>
              <div class="checkbox-group">
                <label class="checkbox-label"
                  ><input type="checkbox" id="prodFsc" /> FSC</label
                >
              </div>
            </fieldset>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="prod_certificado"
                >Adjuntar Comprobantes de Certificación (PDF) :</label
              >
              <input
                type="file"
                id="prod_certificado"
                accept=".pdf"
                class="form-input"
                onchange="subirPdfProducto()"
              />
              <div id="pdfProductoContenedor" style="margin-top: 10px"></div>
            </div>
          </div>

          <button type="submit" id="btnSubmitForm" class="btn-submit-prov">
            Agregar Producto
          </button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
      </div>
    </footer>

    <script type="module">
      import { supabaseClient } from "../js/conexion-bd.js";

      // Capturamos los parámetros de la URL
      const urlParams = new URLSearchParams(window.location.search);
      const provCodigo = urlParams.get("prov"); // Recibe 'PROV-0001' de tu index.html

      // Variables locales para almacenar los datos reales del proveedor una vez validados
      let proveedorUUID = null;
      let proveedorNombre = "";

      // Variable local para almacenar el archivo físico PDF antes del submit
      let tempProductoFile = null;

      document.addEventListener("DOMContentLoaded", async () => {
        // Validación: si no hay un código de proveedor en la URL, redirige de forma segura
        if (!provCodigo) {
          alert(
            "Acceso no autorizado. Ingrese su código de proveedor en la página de inicio.",
          );
          window.location.href = "../index.html";
          return;
        }

        try {
          // Consultamos Supabase para obtener el UUID ('id') y el nombre real del proveedor
          const { data, error } = await supabaseClient
            .from("proveedores_ucu")
            .select("id, nombre, tipo")
            .eq("id_codigo", provCodigo)
            .maybeSingle();

          if (error || !data) {
            alert(
              "El código de proveedor ingresado no es válido o no está registrado.",
            );
            window.location.href = "../index.html";
            return;
          }

          // Verificamos que sea un proveedor aprobado y activo, no postulaciones pendientes
          if (data.tipo !== "proveedor") {
            alert(
              "Su postulación aún se encuentra en estado pendiente de revisión o fue rechazada. No puede agregar productos.",
            );
            window.location.href = "../index.html";
            return;
          }

          // Guardamos los datos reales del proveedor
          proveedorUUID = data.id;
          proveedorNombre = data.nombre;

          // Mostramos la información de manera elegante en pantalla
          document.getElementById("nombreProveedorDisplay").textContent =
            `${proveedorNombre} (${provCodigo})`;
        } catch (err) {
          console.error("Error al validar proveedor:", err);
          alert("Error de comunicación con la base de datos.");
          window.location.href = "../index.html";
        }
      });

      // SELECCIÓN LOCAL: PDF DEL PRODUCTO (ÚNICO)
      window.subirPdfProducto = function () {
        const fileInput = document.getElementById("prod_certificado");
        const file = fileInput.files[0];
        if (!file) return;

        if (file.type !== "application/pdf") {
          alert("Por favor, suba únicamente archivos en formato PDF.");
          fileInput.value = "";
          return;
        }

        tempProductoFile = file;
        renderizarPdfProductoTemp();
        fileInput.value = "";
      };

      window.eliminarPdfProductoTemp = function () {
        tempProductoFile = null;
        renderizarPdfProductoTemp();
      };

      function renderizarPdfProductoTemp() {
        const contenedor = document.getElementById("pdfProductoContenedor");
        contenedor.innerHTML = "";

        if (!tempProductoFile) return;

        const div = document.createElement("div");
        div.style.cssText =
          "background: #ecfdf5; border: 1px solid #a7f3d0; padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #064e3b; max-width: 100%;";
        div.innerHTML = `
 <span>📄 ${tempProductoFile.name}</span>
 <button type="button" onclick="eliminarPdfProductoTemp()" style="background: none; border: none; color: #dc3545; font-weight: bold; cursor: pointer; font-size: 14px;">✕</button>
 `;
        contenedor.appendChild(div);
      }

      // ENVÍO DE SUGERENCIA A SUPABASE (SUBIDA DEL PDF AQUÍ ÚNICAMENTE)
      window.enviarSugerenciaProducto = async function (event) {
        event.preventDefault();

        // Evitamos doble clic deshabilitando el botón
        const btnSubmit = document.getElementById("btnSubmitForm");
        btnSubmit.disabled = true;

        const nombre = document.getElementById("prodNombre").value.trim();
        const precioRaw = document.getElementById("prodPrecio").value;
        const category = document.getElementById("prodCategoria").value;
        const pctRaw = document.getElementById("prodPct").value;
        const reciclable = document.getElementById("prodReciclable").checked;
        const reusable = document.getElementById("prodReutilizable").checked;
        const fsc = document.getElementById("prodFsc").checked;

        const precio = parseFloat(precioRaw);
        const pct = parseInt(pctRaw) || 0;

        if (precio <= 0 || precio >= 99999) {
          alert("Error de Rango: El precio del producto no es válido.");
          btnSubmit.disabled = false;
          return;
        }

        if (pct < 0 || pct > 100) {
          alert(
            "Error de Rango: El porcentaje de material reciclado debe estar entre 0 y 100.",
          );
          btnSubmit.disabled = false;
          return;
        }

        let urlCertificado = null;

        try {
          // =========================================================================
          // PASO 1: SUBIR EL ARCHIVO PDF AL BUCKET 'Certificaciones PROD' (DIFERIDO)
          // =========================================================================
          if (tempProductoFile) {
            btnSubmit.textContent = "Subiendo comprobante de producto...";
            const nombreUnico = `${Date.now()}_prod_${tempProductoFile.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;

            const { error: uploadError } = await supabaseClient.storage
              .from("Certificaciones PROD")
              .upload(nombreUnico, tempProductoFile);

            if (uploadError) {
              throw new Error(
                "Error en bucket de productos: " + uploadError.message,
              );
            }

            const { data: urlData } = supabaseClient.storage
              .from("Certificaciones PROD")
              .getPublicUrl(nombreUnico);

            urlCertificado = urlData.publicUrl;
          }

          btnSubmit.textContent = "Sugerir Producto...";

          // =========================================================================
          // PASO 2: INSERTAR EL PRODUCTO EN LA BASE DE DATOS
          // =========================================================================
          const { error: dbError } = await supabaseClient
            .from("productos_ucu")
            .insert([
              {
                proveedor_id: proveedorUUID, // Usamos la UUID real validada al cargar la página
                nombre: nombre,
                categoria: category,
                precio: precio,
                mat_reciclados_pct: pct,
                es_reciclable: reciclable,
                es_reusable: reusable,
                tiene_fsc: fsc,
                url_certificado: urlCertificado, // Guardamos la URL pública (Opción B)
                estado: "pendiente", // Las sugerencias de proveedores entran siempre como 'pendiente'
              },
            ]);

          if (dbError) throw dbError;

          alert(
            `¡Sugerencia de producto registrada con éxito!\n\nProducto: ${nombre}\nQuedó registrado bajo el estado 'PENDIENTE' para revisión del encargado.`,
          );

          // Limpieza de estado local y redirección
          tempProductoFile = null;
          renderizarPdfProductoTemp();
          document.getElementById("formProducto").reset();
          window.location.href = "../index.html";
        } catch (err) {
          console.error("Error al registrar sugerencia de producto:", err);
          alert("Hubo un problema al procesar la sugerencia: " + err.message);
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.textContent = "Sugerir Producto";
        }
      };
    </script>
  </body>
</html>
