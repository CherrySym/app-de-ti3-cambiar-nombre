<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postulación de Proveedor - UCU</title>
  <link rel="stylesheet" href="../css/global-styles.css" />

  <style>
    /* Configuración base para el Layout Elástico */
    * {
      box-sizing: border-box;
    }

    /* Contenedor principal que centra el formulario */
    .form-container {
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Tarjeta contenedora del Formulario */
    .form-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(19, 33, 60, 0.1);
      border-radius: 24px;
      padding: 35px;
      width: 100%;
      max-width: 750px; /* Un poco más ancho para que las filas dobles respiren bien */
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }

    /* Título principal */
    .form-card h2 {
      color: #13213c;
      font-size: 28px;
      margin-top: 10px;
      margin-bottom: 25px;
      font-weight: 700;
    }

    /* Filas con dos columnas o bloques completos */
    .form-row {
      display: flex;
      gap: 20px;
      width: 100%;
    }

    /* Grupos de campos del formulario */
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
      flex: 1; /* Hace que se dividan el espacio en partes iguales dentro de la fila */
    }

    .form-group label {
      font-weight: 600;
      color: #13213c;
      margin-bottom: 8px;
      font-size: 14px;
    }

    /* Estilos para inputs, selects y textareas */
    .form-input, 
    .form-select, 
    .form-textarea {
      padding: 12px 16px;
      border: 1px solid rgba(19, 33, 60, 0.2);
      border-radius: 8px;
      font-size: 15px;
      background-color: #ffffff;
      color: #333333;
      outline: none;
      font-family: Arial, sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    /* Efecto de foco en los campos */
    .form-input:focus, 
    .form-select:focus, 
    .form-textarea:focus {
      border-color: #2f80ed;
      box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
    }

    /* Configuración para Textareas */
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Grupo de Checkbox */
    .checkbox-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500 !important;
      cursor: pointer;
      color: #4f5e7b;
    }

    .checkbox-label input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Estiliza el botón interno de los inputs tipo file */
    .form-input::file-selector-button {
      background: rgba(47, 128, 237, 0.1);
      color: #2f80ed;
      border: none;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 600;
      margin-right: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* Botón de Enviar (Estilo Institucional) */
    .btn-submit-prov {
      background: linear-gradient(135deg, #1e3264 0%, #13213c 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(30, 50, 100, 0.3);
      transition: transform 0.2s, background-color 0.2s;
      margin-top: 10px;
    }

    .btn-submit-prov:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #243b75 0%, #1a2c52 100%);
      box-shadow: 0 6px 20px rgba(30, 50, 100, 0.4);
    }

    .btn-submit-prov:active {
      transform: translateY(0);
    }

    .footer-container {
      background-color: #1e3264;
      padding: 20px 0;
      width: 100%;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-footer {
      display: block;
      margin: auto;
      height: 30px;
      filter: brightness(0) invert(1);
    }

    /* Responsivo para celulares: Las columnas dobles se apilan */
    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>

  <main class="form-container">
    <section class="form-card">
      
      <div style="margin-bottom: 20px;">
        <a href="#" onclick="window.history.back(); return false;" style="text-decoration: none; color: #1e3264; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;">
          ← Volver atrás
        </a>
      </div>

      <h2>Formulario de Postulación</h2>
      
      <form action="agregar-producto-proveedor.html" onsubmit="alert('¡Postulación enviada correctamente, Gracias!');">
        
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre de la Empresa:</label>
            <input type="text" id="nombre" required class="form-input" placeholder="Ej: EcoProveedores UY Ltda.">
          </div>
          <div class="form-group">
            <label for="contacto">Persona de Contacto:</label>
            <input type="text" id="contacto" required class="form-input" placeholder="Ej: Valentina Rocha">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" required class="form-input" placeholder="contacto@empresa.com.uy">
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono de Contacto:</label>
            <input type="tel" id="telefono" required class="form-input" placeholder="Ej: +598 2 410 8800">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cobertura">Cobertura de Logística:</label>
            <select id="cobertura" class="form-select">
              <option value="local">Local (Nacional)</option>
              <option value="importado">Importado (Internacional)</option>
              <option value="ambos">Ambos</option>
            </select>
          </div>
          <div class="form-group">
            <label for="mat_reciclados_pct">Materiales Reciclados (%):</label>
            <input type="number" id="mat_reciclados_pct" min="0" max="100" class="form-input" placeholder="Ej: 80">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="embalaje_sostenible">¿Utiliza Embalaje Sostenible?:</label>
            <select id="embalaje_sostenible" class="form-select">
              <option value="si">Sí</option>
              <option value="no">No</option>
              <option value="parcial">Parcial</option>
            </select>
          </div>
          <div class="form-group">
            <label for="energia_renovable">¿Utiliza Energía Renovable?:</label>
            <select id="energia_renovable" class="form-select">
              <option value="si">Sí</option>
              <option value="no">No</option>
              <option value="parcial">Parcial</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="politica_devolucion">Política de Devolución de Residuos / Logística Inversa:</label>
            <select id="politica_devolucion" class="form-select">
              <option value="si">Sí, cuenta con plan de retiro de excedentes/envases</option>
              <option value="no">No cuenta con plan de retiro</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Certificaciones de la Empresa:</label>
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" name="certificaciones" value="ISO14001"> ISO 14001</label>
              <label class="checkbox-label"><input type="checkbox" name="certificaciones" value="FSC"> FSC</label>
              <label class="checkbox-label"><input type="checkbox" name="certificaciones" value="EMAS"> EMAS</label>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="pdf_certificados">Adjuntar Comprobantes de Certificación (Formato PDF):</label>
            <input type="file" id="pdf_certificados" accept=".pdf" class="form-input">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="descripcion">Descripción Comercial:</label>
            <textarea id="descripcion" class="form-textarea" placeholder="Breve reseña sobre la empresa y sus materiales..."></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="desafios">Desafíos de Sostenibilidad:</label>
            <textarea id="desafios" class="form-textarea" placeholder="¿Qué dificultades enfrenta la empresa actualmente?"></textarea>
          </div>
          <div class="form-group">
            <label for="metas">Metas a Futuro:</label>
            <textarea id="metas" class="form-textarea" placeholder="Ej: Reducir packaging plástico al 50% para 2027"></textarea>
          </div>
        </div>

        <button type="submit" class="btn-submit-prov">Terminar Postulación</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="footer-container">
      <img src="../assets/logo ucu.png" alt="Logo UCU" class="logo-footer" />
    </div>
  </footer>

</body>
</html>
